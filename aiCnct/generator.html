<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>DC Generator System</title>
<style>
body { margin:0; overflow:hidden; background:#000; color:#fff; font-family:Arial; }

#ui {
  position:absolute; top:10px; left:10px;
  background:rgba(0,0,0,0.4); padding:10px;
}

#info {
  position:absolute; top:10px; right:10px;
  background:rgba(0,0,0,0.5); padding:10px;
  width:320px;
}
</style>
</head>
<body>

<div id="ui">
<button onclick="toggle()">ON / OFF</button><br><br>

속도 ω:
<input type="range" id="speed" min="0" max="1" step="0.05" value="0.1">
<span id="speedVal"></span><br>

자기장 B:
<input type="range" id="field" min="0.5" max="3" step="0.1" value="1">
<span id="fieldVal"></span><br>

코일수 N:
<input type="range" id="turns" min="1" max="10" step="1" value="5">
<span id="turnsVal"></span><br>

저항 R:
<input type="range" id="resistance" min="1" max="20" step="1" value="5">
<span id="resistanceVal"></span><br>
</div>

<div id="info"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
// ===== 슬라이더 표시 =====
function bindSlider(id){
  const slider = document.getElementById(id);
  const label = document.getElementById(id+"Val");

  label.innerText = slider.value;

  slider.oninput = () => {
    label.innerText = slider.value;
  };
}
["speed","field","turns","resistance"].forEach(bindSlider);

// ===== 기본 환경 =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,0,12);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);

// ===== 자석 =====
function magnet(x,color){
  let m = new THREE.Mesh(
    new THREE.BoxGeometry(2,4,2),
    new THREE.MeshBasicMaterial({color})
  );
  m.position.x = x;
  return m;
}
scene.add(magnet(-5,0xff0000));
scene.add(magnet(5,0x0000ff));

// ===== 코일 =====
const coil = new THREE.Mesh(
  new THREE.TorusGeometry(2,0.15,16,100),
  new THREE.MeshBasicMaterial({color:0xffff00})
);
scene.add(coil);

// ===== 정류자 =====
const commutator = new THREE.Mesh(
  new THREE.CylinderGeometry(0.6,0.6,0.6,32),
  new THREE.MeshBasicMaterial({color:0xffaa00})
);
commutator.position.y = -2.5;
scene.add(commutator);

// ===== 부하 =====
const load = new THREE.Mesh(
  new THREE.BoxGeometry(2,1,1),
  new THREE.MeshBasicMaterial({color:0x444444})
);
load.position.set(0,-4,0);
scene.add(load);

// ===== 전류 =====
const arrow = new THREE.ArrowHelper(
  new THREE.Vector3(0,1,0),
  new THREE.Vector3(0,-3,0),
  2,
  0x00ff00
);
scene.add(arrow);

// ===== 파형 =====
const canvas = document.createElement("canvas");
canvas.width = 1024;
canvas.height = 256;
const ctx = canvas.getContext("2d");

const texture = new THREE.CanvasTexture(canvas);

const wave = new THREE.Mesh(
  new THREE.PlaneGeometry(30,5),
  new THREE.MeshBasicMaterial({map:texture})
);
wave.position.set(0,8,-6);
scene.add(wave);

// ===== 상태 =====
let running = true;
let t = 0;

function toggle(){ running = !running; }

// ===== 값 읽기 =====
function getValue(id){
  return parseFloat(document.getElementById(id).value);
}

// ===== 애니메이션 =====
function animate(){
  requestAnimationFrame(animate);

  let speed = getValue("speed"); // ω (각속도/주파수 반영)
  let B = getValue("field");     // 자기장 (진폭 반영)
  let N = getValue("turns");     // 코일수 (진폭 반영)
  let R = getValue("resistance");

  if(running) t += speed;

  coil.rotation.y = t;
  commutator.rotation.y = t;

  // 실제 물리량 계산
  let ac = N * B * Math.sin(t);
  let dc = Math.abs(ac);

  let I = dc / R;
  let P = dc * I;

  // 시각적 요소 업데이트
  arrow.setLength(1 + I * 2);
  load.material.color.setRGB(P/5, 0, 0);

  // 파형 그리기 로직 수정
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // 1. AC 파형 (red) - 주파수는 speed(ω)에, 진폭은 N * B에 비례
  ctx.beginPath();
  ctx.strokeStyle = "red";
  ctx.lineWidth = 2;
  for(let x = 0; x < canvas.width; x++){
    // 주파수(ω)와 진폭(N*B) 인자 반영
    // 80은 화면 표시를 위한 기본 배율입니다.
    let y = 128 + Math.sin(x * 0.01 * (speed * 10) + t) * (N * B * 20);
    if(x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // 2. DC 파형 (white) - 절대값 적용
  ctx.beginPath();
  ctx.strokeStyle = "white";
  ctx.lineWidth = 2;
  for(let x = 0; x < canvas.width; x++){
    let y = 128 - Math.abs(Math.sin(x * 0.01 * (speed * 10) + t)) * (N * B * 20);
    if(x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  texture.needsUpdate = true;

  info.innerHTML = `
  <b>직류 발전기 시스템 모니터</b><br><hr>
  실시간 전압(V): ${dc.toFixed(2)} V<br>
  실시간 전류(I): ${I.toFixed(2)} A<br>
  소비 전력(P): ${P.toFixed(2)} W<br><br>
  <small style="color:red">● Red: 코일 내부 AC</small><br>
  <small style="color:White">● White: 정류된 DC</small>
  `;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// 반응형
addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
