<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Smart Microwave Digital Twin</title>

<!-- 단일 라이브러리 방식 유지 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #d1d5db;
        font-family: 'Malgun Gothic', Arial, sans-serif;
    }

    #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        background: #d1d5db;
    }

    #ui {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 290px;
        padding: 22px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.9);
        color: #f8fafc;
        z-index: 100;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    #ui h2 {
        margin-bottom: 16px;
        font-size: 20px;
        color: #38bdf8;
        font-weight: bold;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 10px;
    }

    .control {
        margin-top: 16px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #94a3b8;
    }

    input[type=range] {
        width: 100%;
        cursor: pointer;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
    }

    #startBtn {
        background: #0284c7;
        margin-top: 16px;
    }
    #startBtn:hover { background: #0ea5e9; }

    #doorBtn {
        background: #475569;
    }
    #doorBtn:hover { background: #64748b; }

    #status {
        margin-top: 14px;
        font-size: 14px;
        text-align: center;
        font-weight: bold;
        color: #4ade80;
    }
</style>
</head>

<body>

<div id="canvas-container"></div>

<div id="ui">
    <h2>⚡ Smart Microwave</h2>

    <div class="control">
        <label>출력 세기 (Power)</label>
        <input type="range" id="power" min="1" max="10" value="5">
    </div>

    <div class="control">
        <label>회전 속도 (Speed)</label>
        <input type="range" id="speed" min="1" max="10" value="5">
    </div>

    <button id="startBtn">가열 시작</button>
    <button id="doorBtn">문 열기</button>
    <div id="status">대기중</div>
</div>

<script>
window.onload = function() {
    const container = document.getElementById('canvas-container');
    const width = window.innerWidth;
    const height = window.innerHeight;

    ///////////////////////////////////////////////////////////
    // SCENE & RENDERER SETUP
    ///////////////////////////////////////////////////////////
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd1d5db); 
    scene.fog = new THREE.Fog(0xd1d5db, 15, 40);

    // [교정] 정면을 완벽히 바라보도록 카메라 위치 수정 (X축을 0으로 세팅)
    const camera = new THREE.PerspectiveCamera(38, width / height, 0.1, 1000);
    camera.position.set(0, 0.8, 6.5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    ///////////////////////////////////////////////////////////
    // LIGHTS SYSTEM
    ///////////////////////////////////////////////////////////
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.85);
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffffff, 1.3);
    mainLight.position.set(5, 10, 7);
    scene.add(mainLight);

    const internalLight = new THREE.PointLight(0xffaa44, 0, 5); // 가열시 내부 조명용
    internalLight.position.set(-0.4, 0, 0);
    scene.add(internalLight);

    ///////////////////////////////////////////////////////////
    // FLOOR & GRID
    ///////////////////////////////////////////////////////////
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(60, 60),
        new THREE.MeshStandardMaterial({ color: 0x9ca3af, roughness: 0.6 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -1.4;
    scene.add(floor);

    const grid = new THREE.GridHelper(30, 30, 0x4b5563, 0xbcbcbc);
    grid.position.y = -1.39;
    scene.add(grid);

    ///////////////////////////////////////////////////////////
    // DIGITAL TWIN MICROWAVE MODEL
    ///////////////////////////////////////////////////////////
    const microwave = new THREE.Group();
    scene.add(microwave);

    // 1. 외벽 바디 (고정 프레임)
    const bodyGeom = new THREE.BoxGeometry(4.6, 2.8, 3.2);
    const bodyMat = new THREE.MeshStandardMaterial({
        color: 0x222630,
        metalness: 0.7,
        roughness: 0.3,
        transparent: true,
        opacity: 0.4
    });
    const bodyMesh = new THREE.Mesh(bodyGeom, bodyMat);
    microwave.add(bodyMesh);

    // 2. [교정] 불투명 크리스탈 유리 턴테이블 원판
    const plateGeom = new THREE.CylinderGeometry(1.0, 1.0, 0.04, 40);
    const plateMat = new THREE.MeshStandardMaterial({
        color: 0xe2e8f0,         // 크리스탈 광택용 연회색조
        metalness: 0.1,
        roughness: 0.1,          // 표면 매끄러움 조절
        transparent: true,
        opacity: 0.65            // 은은한 불투명 유리 표현
    });
    const plateMesh = new THREE.Mesh(plateGeom, plateMat);
    plateMesh.position.set(-0.4, -1.1, 0);
    microwave.add(plateMesh);

    // 3. 음식 피가열체 (원판 위의 다홍색 구체 무대)
    const foodGeom = new THREE.SphereGeometry(0.26, 32, 32);
    const foodMat = new THREE.MeshStandardMaterial({
        color: 0xe11d48,
        emissive: 0xff0000,
        emissiveIntensity: 0.1,
        roughness: 0.4
    });
    const foodMesh = new THREE.Mesh(foodGeom, foodMat);
    foodMesh.position.set(-0.4, -0.84, 0.45); 
    microwave.add(foodMesh);

    // 4. 전면 우측 스마트 컨트롤 조작 패널 (고정)
    const panelGeom = new THREE.BoxGeometry(0.8, 2.6, 0.1);
    const panelMat = new THREE.MeshStandardMaterial({
        color: 0x090d16,
        metalness: 0.8,
        roughness: 0.1,
        emissive: 0x020617,
        emissiveIntensity: 0.3
    });
    const panelMesh = new THREE.Mesh(panelGeom, panelMat);
    panelMesh.position.set(1.8, 0, 1.58);
    microwave.add(panelMesh);

    // 5. 패널 상단 디지털 디스플레이 창
    const displayGeom = new THREE.BoxGeometry(0.5, 0.35, 0.02);
    const displayMat = new THREE.MeshStandardMaterial({
        color: 0x0284c7,
        emissive: 0x00dfff,
        emissiveIntensity: 0.4
    });
    const displayMesh = new THREE.Mesh(displayGeom, displayMat);
    displayMesh.position.set(1.8, 0.9, 1.64);
    microwave.add(displayMesh);

    ///////////////////////////////////////////////////////////
    // [교정] 우측 경첩 기반의 문 개폐 피벗(Pivot) 시스템
    ///////////////////////////////////////////////////////////
    const doorPivot = new THREE.Group();
    // 문의 우측 끝 가장자리를 회전축으로 설정하기 위해 세밀하게 포지셔닝
    doorPivot.position.set(1.4, 0, 1.61); 
    microwave.add(doorPivot);

    const doorGeom = new THREE.BoxGeometry(3.6, 2.6, 0.06);
    const doorMat = new THREE.MeshStandardMaterial({
        color: 0x0f172a,
        metalness: 0.8,
        roughness: 0.1,
        transparent: true,
        opacity: 0.5
    });
    const doorMesh = new THREE.Mesh(doorGeom, doorMat);
    // 피벗 그룹의 로컬 중심점에서 왼쪽으로 절반만큼 밀어야 문이 경첩 끝에 매달려 열립니다.
    doorMesh.position.set(-1.8, 0, 0); 
    doorPivot.add(doorMesh);

    ///////////////////////////////////////////////////////////
    // NEON MICRO WAVES EFFECT
    ///////////////////////////////////////////////////////////
    const waves = [];
    for (let i = 0; i < 3; i++) {
        const waveGeom = new THREE.TorusGeometry(0.35 + i * 0.2, 0.012, 16, 60);
        const waveMat = new THREE.MeshBasicMaterial({
            color: 0x38bdf8,
            transparent: true,
            opacity: 0
        });
        const waveMesh = new THREE.Mesh(waveGeom, waveMat);
        waveMesh.rotation.x = Math.PI / 2;
        waveMesh.position.set(-0.4, -0.2, 0);
        microwave.add(waveMesh);
        waves.push(waveMesh);
    }

    ///////////////////////////////////////////////////////////
    // CONTROL LOGIC & INPUT INTERFACE
    ///////////////////////////////////////////////////////////
    let heating = false;
    let doorOpen = false;

    const powerSlider = document.getElementById('power');
    const speedSlider = document.getElementById('speed');
    const startBtn = document.getElementById('startBtn');
    const doorBtn = document.getElementById('doorBtn');
    const statusText = document.getElementById('status');

    startBtn.onclick = function() {
        if (doorOpen) {
            statusText.innerHTML = "⚠️ 문을 닫아야 가열이 시작됩니다!";
            statusText.style.color = "#f59e0b";
            return;
        }
        heating = !heating;
        if (heating) {
            statusText.innerHTML = "⚡ 고주파 가열 중...";
            statusText.style.color = "#f43f5e";
            startBtn.innerHTML = "정지 (Stop)";
            startBtn.style.background = "#dc2626";
        } else {
            statusText.innerHTML = "대기중";
            statusText.style.color = "#4ade80";
            startBtn.innerHTML = "가열 시작";
            startBtn.style.background = "#0284c7";
        }
    };

    // [추가] 문 열기/닫기 인터랙션 로직
    doorBtn.onclick = function() {
        doorOpen = !doorOpen;
        if (doorOpen) {
            heating = false; // 안전을 위해 문이 열리면 가열 자동 중단
            statusText.innerHTML = "🚪 문 열림";
            statusText.style.color = "#eab308";
            doorBtn.innerHTML = "문 닫기";
            startBtn.innerHTML = "가열 시작";
            startBtn.style.background = "#0284c7";
        } else {
            statusText.innerHTML = "대기중";
            statusText.style.color = "#4ade80";
            doorBtn.innerHTML = "문 열기";
        }
    };

    ///////////////////////////////////////////////////////////
    // MAIN LOOP & PHYSICS ANIMATION
    ///////////////////////////////////////////////////////////
    const clock = new THREE.Clock();
    let foodAngle = 0;

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        // 1. 가열 시 구동 메커니즘
        if (heating) {
            const currentSpeed = parseFloat(speedSlider.value) * 0.012;
            
            // 크리스탈 원판 회전
            plateMesh.rotation.y += currentSpeed;
            
            // 크리스탈 판 위에서 음식 공전
            foodAngle += currentSpeed;
            foodMesh.position.x = -0.4 + Math.sin(foodAngle) * 0.45;
            foodMesh.position.z = 0 + Math.cos(foodAngle) * 0.45;
            foodMesh.rotation.y += currentSpeed;

            // 출력세기 실시간 반영
            const powerFactor = parseFloat(powerSlider.value) * 0.35;
            foodMesh.material.emissiveIntensity = 0.5 + Math.sin(t * 15) * 0.3 + powerFactor;
            internalLight.intensity = 1.0 + Math.sin(t * 10) * 0.2;

            waves.forEach((wave, index) => {
                wave.material.opacity = 0.35 + Math.sin(t * 8 + index) * 0.15;
                const scaleFactor = 1 + Math.sin(t * 6 + index) * 0.04;
                wave.scale.set(scaleFactor, scaleFactor, scaleFactor);
            });

            displayMesh.material.emissiveIntensity = 1.6 + Math.sin(t * 6) * 0.4;
        } else {
            foodMesh.material.emissiveIntensity = 0.1;
            internalLight.intensity = 0;
            displayMesh.material.emissiveIntensity = 0.4;
            waves.forEach(wave => wave.material.opacity *= 0.85);
        }

        // 2. [교정] 문 열림 상태에 따른 120도($\approx 2.1$ rad) 개폐 애니메이션 알고리즘
        // 문이 열리면 우측(Y축 반시계방향)으로 120도(Math.PI / 1.5) 회전합니다.
        const targetDoorRotation = doorOpen ? (Math.PI / 1.5) : 0;
        
        // 프레임별 부드러운 보간 이동 (Lerp 연산)
        doorPivot.rotation.y += (targetDoorRotation - doorPivot.rotation.y) * 0.1;

        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
};
</script>
</body>
</html>
