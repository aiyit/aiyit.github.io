<!DOCTYPE html>
<!-- 
JavaScript for 반복문 요약

1. 기본 문법
   for (초기식; 조건식; 증감식) {
       실행할 코드;
   }

2. 구성 요소
   - 초기식(initialization): 반복 시작 시 변수 초기화 (예: var x = 0)
   - 조건식(condition): 반복을 계속할지 여부 판단 (예: x < 1000)
   - 증감식(increment/decrement): 반복마다 변수 값 변경 (예: x++)

3. 실행 흐름
   - 초기식 실행 → 조건식 검사 → 코드 실행 → 증감식 실행 → 조건식 검사 반복
   - 조건식이 false가 되면 반복 종료

4. 예제 설명
   for (var x = 0; x < 1000; x++) {
       document.write("for : " + x + "<br />");
   }
   → 0부터 999까지 출력
-->

<html>
<head>
<title>예제8-16 for 반복문</title>
</head>
<body>
<h3> for 반복문</h3>
<Script>
    for ( var x = 0; x < 1000; x++) {
        document.write("for : " + x + "<br />");    }
</Script>
</body>
</html>
