<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Smart Microwave Digital Twin</title>

<!-- 의존성 없는 단일 라이브러리 체계 유지 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #d1d5db;
        font-family: 'Malgun Gothic', Arial, sans-serif;
    }

    #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        background: #d1d5db;
    }

    #ui {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 290px;
        padding: 22px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.9);
        color: #f8fafc;
        z-index: 100;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    #ui h2 {
        margin-bottom: 16px;
        font-size: 20px;
        color: #38bdf8;
        font-weight: bold;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 10px;
    }

    .control {
        margin-top: 16px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #94a3b8;
    }

    input[type=range] {
        width: 100%;
        cursor: pointer;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 14px;
        border: none;
        border-radius: 8px;
        background: #0284c7;
        color: white;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
    }

    button:hover {
        transform: translateY(-2px);
        background: #0ea5e9;
    }

    #status {
        margin-top: 14px;
        font-size: 14px;
        text-align: center;
        font-weight: bold;
        color: #4ade80;
    }
</style>
</head>

<body>

<div id="canvas-container"></div>

<div id="ui">
    <h2>⚡ Smart Microwave</h2>

    <div class="control">
        <label>출력 세기 (Power)</label>
        <input type="range" id="power" min="1" max="10" value="5">
    </div>

    <div class="control">
        <label>회전 속도 (Speed)</label>
        <input type="range" id="speed" min="1" max="10" value="5">
    </div>

    <button id="startBtn">가열 시작</button>
    <div id="status">대기중</div>
</div>

<script>
window.onload = function() {
    const container = document.getElementById('canvas-container');
    const width = window.innerWidth;
    const height = window.innerHeight;

    ///////////////////////////////////////////////////////////
    // SCENE & RENDERER SETUP
    ///////////////////////////////////////////////////////////
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd1d5db); 
    scene.fog = new THREE.Fog(0xd1d5db, 15, 40);

    // 내부 회전판 구동이 가장 잘 내려다보이는 각도로 카메라 조절
    const camera = new THREE.PerspectiveCamera(40, width / height, 0.1, 1000);
    camera.position.set(4.5, 4.0, 6.5);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    ///////////////////////////////////////////////////////////
    // LIGHTS SYSTEM
    ///////////////////////////////////////////////////////////
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffffff, 1.5);
    mainLight.position.set(6, 12, 6);
    scene.add(mainLight);

    const fillLight = new THREE.DirectionalLight(0xffffff, 0.5);
    fillLight.position.set(-6, 4, -3);
    scene.add(fillLight);

    ///////////////////////////////////////////////////////////
    // FLOOR & GRID
    ///////////////////////////////////////////////////////////
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(60, 60),
        new THREE.MeshStandardMaterial({ color: 0x9ca3af, roughness: 0.6 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -1.4;
    scene.add(floor);

    const grid = new THREE.GridHelper(30, 30, 0x4b5563, 0xbcbcbc);
    grid.position.y = -1.39;
    scene.add(grid);

    ///////////////////////////////////////////////////////////
    // DIGITAL TWIN MICROWAVE MODEL (공간 고정 유닛)
    ///////////////////////////////////////////////////////////
    const microwave = new THREE.Group();
    scene.add(microwave);

    // 1. 외벽 바디 (고정)
    const bodyGeom = new THREE.BoxGeometry(4.6, 2.8, 3.2);
    const bodyMat = new THREE.MeshStandardMaterial({
        color: 0x222630,
        metalness: 0.7,
        roughness: 0.25,
        transparent: true,
        opacity: 0.45
    });
    const bodyMesh = new THREE.Mesh(bodyGeom, bodyMat);
    microwave.add(bodyMesh);

    // 2. 내부 유리 턴테이블 (가열 시 독립 회전체)
    const plateGeom = new THREE.CylinderGeometry(1.0, 1.0, 0.05, 32);
    const plateMat = new THREE.MeshStandardMaterial({
        color: 0xffffff,
        roughness: 0.1,
        transparent: true,
        opacity: 0.8
    });
    const plateMesh = new THREE.Mesh(plateGeom, plateMat);
    plateMesh.position.set(-0.4, -1.1, 0);
    microwave.add(plateMesh);

    // 3. 음식 피가열체 (가열 시 독립 회전체)
    const foodGeom = new THREE.SphereGeometry(0.28, 32, 32);
    const foodMat = new THREE.MeshStandardMaterial({
        color: 0xe11d48,
        emissive: 0xff0000,
        emissiveIntensity: 0.15,
        roughness: 0.4
    });
    const foodMesh = new THREE.Mesh(foodGeom, foodMat);
    // 회전축을 원판 중심에서 바깥으로 살짝 오프셋 시켜 돌도록 배치
    foodMesh.position.set(-0.4, -0.8, 0.4); 
    microwave.add(foodMesh);

    // 4. 전면 도어 글라스 (고정)
    const doorGeom = new THREE.BoxGeometry(3.6, 2.6, 0.06);
    const doorMat = new THREE.MeshStandardMaterial({
        color: 0x0f172a,
        metalness: 0.8,
        roughness: 0.1,
        transparent: true,
        opacity: 0.55
    });
    const doorMesh = new THREE.Mesh(doorGeom, doorMat);
    doorMesh.position.set(-0.4, 0, 1.61);
    microwave.add(doorMesh);

    // 5. 전면 우측 스마트 컨트롤 패널 (고정)
    const panelGeom = new THREE.BoxGeometry(0.8, 2.6, 0.1);
    const panelMat = new THREE.MeshStandardMaterial({
        color: 0x090d16,
        metalness: 0.8,
        roughness: 0.1,
        emissive: 0x020617,
        emissiveIntensity: 0.4
    });
    const panelMesh = new THREE.Mesh(panelGeom, panelMat);
    panelMesh.position.set(1.8, 0, 1.58);
    microwave.add(panelMesh);

    // 6. 패널 상단 디지털 디스플레이 창 (고정)
    const displayGeom = new THREE.BoxGeometry(0.6, 0.4, 0.02);
    const displayMat = new THREE.MeshStandardMaterial({
        color: 0x0284c7,
        emissive: 0x00dfff,
        emissiveIntensity: 0.5
    });
    const displayMesh = new THREE.Mesh(displayGeom, displayMat);
    displayMesh.position.set(1.8, 0.9, 1.64);
    microwave.add(displayMesh);

    ///////////////////////////////////////////////////////////
    // NEON MICRO WAVES EFFECT (고주파 파형 고리 - 고정)
    ///////////////////////////////////////////////////////////
    const waves = [];
    for (let i = 0; i < 3; i++) {
        const waveGeom = new THREE.TorusGeometry(0.35 + i * 0.2, 0.012, 16, 60);
        const waveMat = new THREE.MeshBasicMaterial({
            color: 0x38bdf8,
            transparent: true,
            opacity: 0
        });
        const waveMesh = new THREE.Mesh(waveGeom, waveMat);
        waveMesh.rotation.x = Math.PI / 2;
        waveMesh.position.set(-0.4, -0.2, 0);
        microwave.add(waveMesh);
        waves.push(waveMesh);
    }

    ///////////////////////////////////////////////////////////
    // CONTROL LOGIC & REAL-TIME INPUTS
    ///////////////////////////////////////////////////////////
    let heating = false;

    const powerSlider = document.getElementById('power');
    const speedSlider = document.getElementById('speed');
    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('status');

    startBtn.onclick = function() {
        heating = !heating;
        if (heating) {
            statusText.innerHTML = "⚡ 고주파 가열 중...";
            statusText.style.color = "#f43f5e";
            startBtn.innerHTML = "정지 (Stop)";
            startBtn.style.background = "#dc2626";
        } else {
            statusText.innerHTML = "대기중";
            statusText.style.color = "#4ade80";
            startBtn.innerHTML = "가열 시작";
            startBtn.style.background = "#0284c7";
        }
    };

    ///////////////////////////////////////////////////////////
    // ANIMATION & REAL-TIME INTERACTION LOOP
    ///////////////////////////////////////////////////////////
    const clock = new THREE.Clock();

    // 음식을 원판 중심 기준으로 공전시키기 위한 각도 변수
    let foodAngle = 0;

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        // [교정] 본체 공전 제거: microwave.rotation.y 연산 전면 삭제 (기기 완벽 고정)

        if (heating) {
            // 1. [교정] 회전 속도 제어 실시간 연동 (슬라이더 값 적용)
            const currentSpeed = parseFloat(speedSlider.value) * 0.01;
            
            // 원판 자체 회전
            plateMesh.rotation.y += currentSpeed;
            
            // 음식의 공전 수식 연산 (원판 위에 고정되어 같이 도는 연출)
            foodAngle += currentSpeed;
            foodMesh.position.x = -0.4 + Math.sin(foodAngle) * 0.5;
            foodMesh.position.z = 0 + Math.cos(foodAngle) * 0.5;
            foodMesh.rotation.y += currentSpeed; // 자체 자전 효과 추가

            // 2. [교정] 출력 세기 제어 실시간 연동 (슬라이더 값 적용)
            const powerFactor = parseFloat(powerSlider.value) * 0.35;
            foodMesh.material.emissiveIntensity = 0.5 + Math.sin(t * 15) * 0.3 + powerFactor;

            // 3. 고주파 특수 효과 파형 제어
            waves.forEach((wave, index) => {
                wave.material.opacity = 0.35 + Math.sin(t * 8 + index) * 0.15;
                const scaleFactor = 1 + Math.sin(t * 6 + index) * 0.04;
                wave.scale.set(scaleFactor, scaleFactor, scaleFactor);
            });

            displayMesh.material.emissiveIntensity = 1.6 + Math.sin(t * 6) * 0.4;
            panelMesh.material.emissiveIntensity = 0.9;
        } else {
            // 정지 상태 시 실시간 복귀 및 감쇠
            foodMesh.material.emissiveIntensity = 0.15;
            displayMesh.material.emissiveIntensity = 0.5;
            panelMesh.material.emissiveIntensity = 0.4;
            
            waves.forEach(wave => {
                wave.material.opacity *= 0.85; 
            });
        }

        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
};
</script>
</body>
</html>
