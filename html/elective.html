<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Smart Microwave Digital Twin</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        overflow:hidden;
        background:#0b0f17;
        font-family:Arial, sans-serif;
    }

    canvas{
        display:block;
    }

    #ui{
        position:fixed;
        top:20px;
        left:20px;
        width:280px;
        padding:20px;
        border-radius:18px;
        background:rgba(10,15,25,0.85);
        color:white;
        z-index:100;

        backdrop-filter:blur(12px);

        box-shadow:
        0 0 25px rgba(0,0,0,0.45);
    }

    #ui h2{
        margin-bottom:18px;
        font-size:22px;
        color:#7de7ff;
    }

    .control{
        margin-top:18px;
    }

    label{
        display:block;
        margin-bottom:8px;
        font-size:14px;
    }

    input[type=range]{
        width:100%;
    }

    button{
        width:100%;
        padding:12px;
        margin-top:14px;
        border:none;
        border-radius:10px;

        background:#00bfff;
        color:white;

        font-size:15px;
        font-weight:bold;

        cursor:pointer;

        transition:0.25s;
    }

    button:hover{
        transform:scale(1.03);
        background:#22ccff;
    }

    #status{
        margin-top:16px;
        font-size:14px;
        color:#7dffae;
    }

</style>
</head>

<body>

<div id="ui">

    <h2>⚡ Smart Microwave</h2>

    <div class="control">
        <label>출력 세기</label>
        <input type="range" id="power" min="1" max="10" value="5">
    </div>

    <div class="control">
        <label>회전 속도</label>
        <input type="range" id="speed" min="1" max="10" value="5">
    </div>

    <button id="startBtn">
        가열 시작
    </button>

    <button id="doorBtn">
        문 열기
    </button>

    <div id="status">
        대기중
    </div>

</div>

<script type="module">

///////////////////////////////////////////////////////////
// IMPORT
///////////////////////////////////////////////////////////

import * as THREE from
'https://unpkg.com/three@0.160.0/build/three.module.js';

import { OrbitControls } from
'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

///////////////////////////////////////////////////////////
// SCENE
///////////////////////////////////////////////////////////

const scene = new THREE.Scene();

scene.background =
new THREE.Color(0x0b0f17);

scene.fog =
new THREE.Fog(0x0b0f17,15,40);

///////////////////////////////////////////////////////////
// CAMERA
///////////////////////////////////////////////////////////

const camera =
new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(8,5,10);

///////////////////////////////////////////////////////////
// RENDERER
///////////////////////////////////////////////////////////

const renderer =
new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.shadowMap.enabled = true;

renderer.domElement.style.position = 'fixed';
renderer.domElement.style.top = '0';
renderer.domElement.style.left = '0';
renderer.domElement.style.zIndex = '1';

document.body.appendChild(renderer.domElement);

///////////////////////////////////////////////////////////
// CONTROLS
///////////////////////////////////////////////////////////

const controls =
new OrbitControls(
camera,
renderer.domElement
);

controls.enableDamping = true;

controls.target.set(0,1.5,0);

///////////////////////////////////////////////////////////
// LIGHT
///////////////////////////////////////////////////////////

const ambient =
new THREE.AmbientLight(
0xffffff,
1
);

scene.add(ambient);

const directional =
new THREE.DirectionalLight(
0xffffff,
2
);

directional.position.set(10,20,10);

directional.castShadow = true;

scene.add(directional);

///////////////////////////////////////////////////////////
// FLOOR
///////////////////////////////////////////////////////////

const floor =
new THREE.Mesh(

    new THREE.PlaneGeometry(50,50),

    new THREE.MeshStandardMaterial({
        color:0x1d2630,
        roughness:0.9
    })
);

floor.rotation.x = -Math.PI/2;

floor.receiveShadow = true;

scene.add(floor);

///////////////////////////////////////////////////////////
// MICROWAVE GROUP
///////////////////////////////////////////////////////////

const microwave =
new THREE.Group();

scene.add(microwave);

///////////////////////////////////////////////////////////
// BODY
///////////////////////////////////////////////////////////

const body =
new THREE.Mesh(

    new THREE.BoxGeometry(6,3.5,4),

    new THREE.MeshStandardMaterial({
        color:0xd2d2d2,
        metalness:0.85,
        roughness:0.25
    })
);

body.position.y = 1.8;

body.castShadow = true;

microwave.add(body);

///////////////////////////////////////////////////////////
// INNER CAVITY
///////////////////////////////////////////////////////////

const cavity =
new THREE.Mesh(

    new THREE.BoxGeometry(
        5.3,
        2.8,
        3.2
    ),

    new THREE.MeshStandardMaterial({
        color:0x111111,
        side:THREE.BackSide
    })
);

cavity.position.set(0,1.8,0);

microwave.add(cavity);

///////////////////////////////////////////////////////////
// DOOR
///////////////////////////////////////////////////////////

const doorPivot =
new THREE.Group();

doorPivot.position.set(-3,1.8,2.05);

microwave.add(doorPivot);

const door =
new THREE.Mesh(

    new THREE.BoxGeometry(
        6,
        3.2,
        0.12
    ),

    new THREE.MeshStandardMaterial({
        color:0x222222,
        transparent:true,
        opacity:0.75,
        metalness:0.5,
        roughness:0.2
    })
);

door.position.x = 3;

door.castShadow = true;

doorPivot.add(door);

///////////////////////////////////////////////////////////
// PLATE
///////////////////////////////////////////////////////////

const plate =
new THREE.Mesh(

    new THREE.CylinderGeometry(
        1.2,
        1.2,
        0.08,
        64
    ),

    new THREE.MeshStandardMaterial({
        color:0x9fe7ff,
        transparent:true,
        opacity:0.7
    })
);

plate.position.set(0,0.45,0);

plate.castShadow = true;

microwave.add(plate);

///////////////////////////////////////////////////////////
// FOOD
///////////////////////////////////////////////////////////

const food =
new THREE.Mesh(

    new THREE.SphereGeometry(
        0.5,
        32,
        32
    ),

    new THREE.MeshStandardMaterial({
        color:0xff8844,
        emissive:0xff3300,
        emissiveIntensity:0.3
    })
);

food.position.set(0,0.95,0);

food.castShadow = true;

microwave.add(food);

///////////////////////////////////////////////////////////
// CONTROL PANEL
///////////////////////////////////////////////////////////

const panel =
new THREE.Mesh(

    new THREE.BoxGeometry(
        1,
        3,
        0.3
    ),

    new THREE.MeshStandardMaterial({
        color:0x18334f,
        emissive:0x08111f
    })
);

panel.position.set(2.6,1.8,2.15);

microwave.add(panel);

///////////////////////////////////////////////////////////
// MICROWAVE WAVES
///////////////////////////////////////////////////////////

const waves = [];

for(let i=0;i<4;i++){

    const wave =
    new THREE.Mesh(

        new THREE.TorusGeometry(
            1.2 + i*0.2,
            0.03,
            16,
            100
        ),

        new THREE.MeshBasicMaterial({
            color:0x00ccff,
            transparent:true,
            opacity:0.15
        })
    );

    wave.rotation.x = Math.PI/2;

    wave.position.y = 1.2;

    microwave.add(wave);

    waves.push(wave);
}

///////////////////////////////////////////////////////////
// STATES
///////////////////////////////////////////////////////////

let heating = false;
let doorOpen = false;

///////////////////////////////////////////////////////////
// UI
///////////////////////////////////////////////////////////

const powerSlider =
document.getElementById('power');

const speedSlider =
document.getElementById('speed');

const statusText =
document.getElementById('status');

///////////////////////////////////////////////////////////
// START BUTTON
///////////////////////////////////////////////////////////

document
.getElementById('startBtn')
.onclick = ()=>{

    if(doorOpen){

        statusText.innerHTML =
        '문이 열려 있습니다';

        return;
    }

    heating = !heating;

    statusText.innerHTML =
    heating ? '가열중...' : '정지';
};

///////////////////////////////////////////////////////////
// DOOR BUTTON
///////////////////////////////////////////////////////////

document
.getElementById('doorBtn')
.onclick = ()=>{

    doorOpen = !doorOpen;

    if(doorOpen){

        heating = false;

        statusText.innerHTML =
        '문 열림';

    }else{

        statusText.innerHTML =
        '문 닫힘';
    }
};

///////////////////////////////////////////////////////////
// CLOCK
///////////////////////////////////////////////////////////

const clock =
new THREE.Clock();

///////////////////////////////////////////////////////////
// ANIMATION
///////////////////////////////////////////////////////////

function animate(){

    requestAnimationFrame(animate);

    const t =
    clock.getElapsedTime();

    controls.update();

    ///////////////////////////////////////////////////////
    // PLATE ROTATION
    ///////////////////////////////////////////////////////

    const speed =
    Number(speedSlider.value)
    * 0.01;

    if(heating){

        plate.rotation.y += speed;

        food.rotation.y += speed;
    }

    ///////////////////////////////////////////////////////
    // DOOR ANIMATION
    ///////////////////////////////////////////////////////

    const targetRotation =
    doorOpen
    ? -Math.PI/1.8
    : 0;

    doorPivot.rotation.y +=
    (
        targetRotation
        - doorPivot.rotation.y
    ) * 0.08;

    ///////////////////////////////////////////////////////
    // FOOD GLOW
    ///////////////////////////////////////////////////////

    if(heating){

        const intensity =
        Number(powerSlider.value)
        * 0.15;

        food.material.emissiveIntensity =
        0.5
        + Math.sin(t*8)*0.3
        + intensity;

    }else{

        food.material.emissiveIntensity =
        0.2;
    }

    ///////////////////////////////////////////////////////
    // WAVE EFFECT
    ///////////////////////////////////////////////////////

    waves.forEach((wave,index)=>{

        if(heating){

            wave.material.opacity =
            0.15
            + Math.sin(t*4+index)
            * 0.12;

            const scale =
            1
            + Math.sin(t*3+index)
            * 0.08;

            wave.scale.set(
                scale,
                scale,
                scale
            );

        }else{

            wave.material.opacity *= 0.96;
        }
    });

    ///////////////////////////////////////////////////////
    // PANEL GLOW
    ///////////////////////////////////////////////////////

    panel.material.emissiveIntensity =
    heating ? 1.2 : 0.3;

    ///////////////////////////////////////////////////////
    // RENDER
    ///////////////////////////////////////////////////////

    renderer.render(
        scene,
        camera
    );
}

animate();

///////////////////////////////////////////////////////////
// RESIZE
///////////////////////////////////////////////////////////

window.addEventListener(
'resize',
()=>{

    camera.aspect =
    window.innerWidth
    / window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
});

</script>

</body>
</html>
