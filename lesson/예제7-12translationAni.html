<!DOCTYPE html>
<html>
<head>
<title>예제7-12 이동 Animation</title>
<style> 
  /* div 기본 스타일 */
  div {
    width: 100px;                /* 박스 너비 */
    height: 50px;                /* 박스 높이 */
    background: cyan;             /* 배경색 */
    position: relative;           /* 위치 기준 설정 (left, top 적용 가능) */
    animation-name: color;        /* 실행할 애니메이션 이름 */
    animation-duration: 5s;       /* 애니메이션 실행 시간: 5초 */
  }

  /* keyframes 정의: 위치와 테두리 변화 */
  @keyframes color {
    0%   { border: 2px dotted red;    left: 0px;   top: 0px; }       /* 시작: 좌상단 */
    25%  { border: 5px dashed green;  left: 200px; top: 0px; }       /* 오른쪽으로 이동 */
    50%  { border: 15px groove blue;  left: 200px; top: 200px; }     /* 오른쪽 아래로 이동 */
    75%  { border: 5px inset cyan;    left: 0px;   top: 200px; }     /* 왼쪽 아래로 이동 */
    100% { border: 2px solid orange;  left: 0px;   top: 0px; }       /* 다시 원래 위치로 */
  }
</style>
</head>
<body>
  <!-- 박스: 애니메이션 적용 -->
  <div>
    <h4 style="color:gray;">translation Animation</h4>
  </div>
</body>
</html>
