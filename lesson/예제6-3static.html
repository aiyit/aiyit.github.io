<!DOCTYPE html>
<!--
=========================================
CSS position 속성 핵심 요약
=========================================

■ static (기본값)
- 일반 문서 흐름대로 배치
- top, right, bottom, left 적용 안됨

■ relative
- 원래 위치를 기준으로 이동
- 원래 공간은 그대로 유지

■ absolute
- 가장 가까운 position(relative, absolute, fixed) 부모 기준
- 문서 흐름에서 제외됨(원래 공간 사라짐)

■ fixed
- 브라우저 화면(viewport) 기준으로 고정
- 스크롤해도 위치 유지

■ sticky
- 평소에는 relative처럼 배치
- 지정 위치(top 등)에 도달하면 fixed처럼 고정
- top(또는 left/right/bottom) 지정 필요

※ 핵심
- static   : 기본 배치
- relative : 원래 위치 기준 이동
- absolute : 부모 기준 절대 위치
- fixed    : 화면 기준 고정
- sticky   : 스크롤 시 고정
-->
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>예제 6-3 위치 설정(positioning): static</title>
  <!-- 외부 CSS 파일 연결 -->
  <link rel="stylesheet" href="color.css">
  <style>
    /* 공통 스타일: static-box 클래스 */
    .static-box {
      position: static;       /* 기본 위치 속성 (좌표 지정 불가) */
      width: 200px;           /* 박스 너비 */
      height: 50px;           /* 박스 높이 */
      margin: 10px 0;         /* 위아래 여백 */
      line-height: 50px;      /* 텍스트 수직 가운데 정렬 */
      color: white;           /* 기본 글자색 흰색 */
      text-align: center;     /* 텍스트 가로 가운데 정렬 */
      font-weight: bold;      /* 글자 굵게 */
    }

    /* 색상별 박스 스타일 */
    .box-red { background: #ff0000; }       /* 빨강 박스 */
    .box-green { background: #11ff00; color: black; } /* 초록 박스, 글자 검정 */
    .box-blue { background: #0000ff; }      /* 파랑 박스 */
    .box-cyan { background: #00ffff; color: black; }  /* 하늘색 박스, 글자 검정 */
    .box-yellow { background: #ffff00; color: black; }/* 노랑 박스, 글자 검정 */
  </style>
</head>
<body>
  <h3>static 정적 배치</h3>

  <!-- static: 기본 위치, 좌표 지정 불가 -->
  <div class="static-box box-red">position: static</div>
  <div class="static-box box-green">position: static</div>
  <div class="static-box box-blue">position: static</div>
  <div class="static-box box-cyan">position: static</div>
  <div class="static-box box-yellow">position: static</div>
</body>
</html>
