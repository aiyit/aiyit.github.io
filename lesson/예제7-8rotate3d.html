<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>예제7-8 rotate3d()</title>
  <style>
    /* 컨테이너: 3D 원근감 설정 + flex 배치 */
    .container {
      perspective: 600px;   /* 원근감(깊이감) 설정 */
      margin: 50px;         /* 바깥 여백 */
      display: flex;        /* 가로로 나란히 배치 */
      gap: 30px;            /* 박스 간격 */
    }

    /* 공통 박스 스타일 */
    .box {
      width: 100px;         /* 박스 너비 */
      height: 100px;        /* 박스 높이 */
      background-color: #3498db; /* 기본 파랑 배경 */
      color: white;         /* 글자색 흰색 */
      text-align: center;   /* 텍스트 가로 가운데 정렬 */
      line-height: 100px;   /* 텍스트 수직 가운데 정렬 */
      font-weight: bold;    /* 글자 굵게 */
      transition: transform 0.6s; /* 변환 시 애니메이션 효과 */
    }

    /* X축 회전 */
    .x-rotate {
      transform: rotate3d(1, 0, 0, 45deg);
      /* X축 기준으로 45도 회전 */
    }

    /* Y축 회전 */
    .y-rotate {
      transform: rotate3d(0, 1, 0, 45deg);
      /* Y축 기준으로 45도 회전 */
    }

    /* Z축 회전 */
    .z-rotate {
      transform: rotate3d(0, 0, 1, 45deg);
      /* Z축 기준으로 45도 회전 */
    }

    /* X축과 Y축 동시에 회전 */
    .xy-rotate {
      transform: rotate3d(1, 1, 0, 60deg);
      /* X축과 Y축을 동시에 기준으로 60도 회전 */
    }
  </style>
</head>
<body>
  <h2>rotate3d() 3차원 회전 예제</h2>
  <div class="container">
    <!-- X축 회전 -->
    <div class="box x-rotate">X축</div>

    <!-- Y축 회전 -->
    <div class="box y-rotate">Y축</div>

    <!-- Z축 회전 -->
    <div class="box z-rotate">Z축</div>

    <!-- X축과 Y축 동시에 회전 -->
    <div class="box xy-rotate">XY축</div>
  </div>
</body>
</html>
