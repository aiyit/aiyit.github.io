<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Smart Microwave Digital Twin</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0b0f17;
        font-family: Arial, sans-serif;
    }

    /* 3D 장면이 무조건 꽉 차게 그려지도록 공간 강제 확보 */
    #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
    }

    /* 컨트롤러 UI를 3D 화면보다 무조건 상위에 배치 */
    #ui {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 280px;
        padding: 20px;
        border-radius: 18px;
        background: rgba(10, 15, 25, 0.85);
        color: white;
        z-index: 100;
        backdrop-filter: blur(12px);
        box-shadow: 0 0 25px rgba(0,0,0,0.45);
        pointer-events: auto; /* UI 클릭 정상 작동 보장 */
    }

    #ui h2 {
        margin-bottom: 18px;
        font-size: 22px;
        color: #7de7ff;
    }

    .control {
        margin-top: 18px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
    }

    input[type=range] {
        width: 100%;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 14px;
        border: none;
        border-radius: 10px;
        background: #00bfff;
        color: white;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.25s;
    }

    button:hover {
        transform: scale(1.03);
        background: #22ccff;
    }

    #status {
        margin-top: 16px;
        font-size: 14px;
        color: #7dffae;
    }
</style>
</head>

<body>

<!-- 3D 렌더링 전용 컨테이너 레이어 -->
<div id="canvas-container"></div>

<div id="ui">
    <h2>⚡ Smart Microwave</h2>

    <div class="control">
        <label>출력 세기</label>
        <input type="range" id="power" min="1" max="10" value="5">
    </div>

    <div class="control">
        <label>회전 속도</label>
        <input type="range" id="speed" min="1" max="10" value="5">
    </div>

    <button id="startBtn">가열 시작</button>
    <button id="doorBtn">문 열기</button>

    <div id="status">대기중</div>
</div>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

const container = document.getElementById('canvas-container');

// 컨테이너 실제 픽셀 크기 계산 (0 일때를 대비해 하드코딩 방어막 구축)
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

///////////////////////////////////////////////////////////
// SCENE & RENDERER
///////////////////////////////////////////////////////////
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0f17);

// 시야 방해 요소를 줄이기 위해 안개 일시 제거 (확인용)
// scene.fog = new THREE.Fog(0x0b0f17, 20, 100); 

const camera = new THREE.PerspectiveCamera(60, width / height, 0.1, 1000);
camera.position.set(6, 5, 8); 

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(width, height);
renderer.shadowMap.enabled = true;
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// 컨테이너 내부에 캔버스 삽입
container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1.5, 0);

///////////////////////////////////////////////////////////
// LIGHTS (조명 밝기 대폭 상향)
///////////////////////////////////////////////////////////
const ambient = new THREE.AmbientLight(0xffffff, 2.0); 
scene.add(ambient);

const directional = new THREE.DirectionalLight(0xffffff, 2.5);
directional.position.set(10, 15, 10);
directional.castShadow = true;
scene.add(directional);

///////////////////////////////////////////////////////////
// FLOOR (그리드 헬퍼 추가하여 공간감 확보)
///////////////////////////////////////////////////////////
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 60),
    new THREE.MeshStandardMaterial({ color: 0x232d38, roughness: 0.6 })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

const gridHelper = new THREE.GridHelper(20, 20, 0x00bfff, 0x1f3d5c);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

///////////////////////////////////////////////////////////
// MICROWAVE DIGITAL TWIN MODEL
///////////////////////////////////////////////////////////
const microwave = new THREE.Group();
scene.add(microwave);

// 외벽 바디 (확연히 보이도록 반투명도를 낮추고 에메랄드 톤 실버 적용)
const body = new THREE.Mesh(
    new THREE.BoxGeometry(6, 3.5, 4),
    new THREE.MeshStandardMaterial({
        color: 0xcccccc,
        metalness: 0.5,
        roughness: 0.2,
        transparent: true,
        opacity: 0.5 
    })
);
body.position.y = 1.75;
body.castShadow = true;
microwave.add(body);

// 턴테이블 회전판
const plate = new THREE.Mesh(
    new THREE.CylinderGeometry(1.4, 1.4, 0.08, 32),
    new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1 })
);
plate.position.set(-0.5, 0.15, 0); 
plate.receiveShadow = true;
microwave.add(plate);

// 음식 오브젝트
const food = new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 32, 32),
    new THREE.MeshStandardMaterial({
        color: 0xff7722,
        emissive: 0xff3300,
        emissiveIntensity: 0.3
    })
);
food.position.set(-0.5, 0.55, 0);
food.castShadow = true;
microwave.add(food);

// 우측 기기 컨트롤 조작반
const panel = new THREE.Mesh(
    new THREE.BoxGeometry(1.0, 3.3, 0.2),
    new THREE.MeshStandardMaterial({ color: 0x1a334d, emissive: 0x0b1621, emissiveIntensity: 0.4 })
);
panel.position.set(2.4, 1.75, 1.91);
microwave.add(panel);

// 정밀 문(Door) 피벗 레이어
const doorPivot = new THREE.Group();
doorPivot.position.set(-3, 1.75, 2.01); 
microwave.add(doorPivot);

const door = new THREE.Mesh(
    new THREE.BoxGeometry(4.8, 3.3, 0.08), 
    new THREE.MeshStandardMaterial({
        color: 0x111111,
        transparent: true,
        opacity: 0.6,
        metalness: 0.7,
        roughness: 0.1
    })
);
door.position.set(2.4, 0, 0); 
door.castShadow = true;
doorPivot.add(door);

///////////////////////////////////////////////////////////
// MICROWAVE WAVES EFFECT (고주파 파형 가상화)
///////////////////////////////////////////////////////////
const waves = [];
for (let i = 0; i < 3; i++) {
    const wave = new THREE.Mesh(
        new THREE.TorusGeometry(0.5 + i * 0.25, 0.02, 16, 80),
        new THREE.MeshBasicMaterial({ color: 0x00dfff, transparent: true, opacity: 0 })
    );
    wave.rotation.x = Math.PI / 2;
    wave.position.set(-0.5, 1.1, 0);
    microwave.add(wave);
    waves.push(wave);
}

///////////////////////////////////////////////////////////
// INTERACTION CONTROLS
///////////////////////////////////////////////////////////
let heating = false;
let doorOpen = false;

const powerSlider = document.getElementById('power');
const speedSlider = document.getElementById('speed');
const statusText = document.getElementById('status');

document.getElementById('startBtn').onclick = () => {
    if (doorOpen) {
        statusText.innerHTML = '문이 열려 있습니다!';
        return;
    }
    heating = !heating;
    statusText.innerHTML = heating ? '⚡ 가열 중...' : '정지됨';
    statusText.style.color = heating ? '#ff4565' : '#7dffae';
};

document.getElementById('doorBtn').onclick = () => {
    doorOpen = !doorOpen;
    if (doorOpen) {
        heating = false;
        statusText.innerHTML = '🚪 문 열림';
        statusText.style.color = '#ffcc00';
    } else {
        statusText.innerHTML = '대기중';
        statusText.style.color = '#7dffae';
    }
};

///////////////////////////////////////////////////////////
// RENDER LOOP
///////////////////////////////////////////////////////////
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    controls.update();

    if (heating) {
        const speed = Number(speedSlider.value) * 0.015;
        plate.rotation.y += speed;
        food.rotation.y += speed;
    }

    const targetRotation = doorOpen ? -Math.PI / 1.7 : 0;
    doorPivot.rotation.y += (targetRotation - doorPivot.rotation.y) * 0.12;

    if (heating) {
        const intensity = Number(powerSlider.value) * 0.25;
        food.material.emissiveIntensity = 0.6 + Math.sin(t * 12) * 0.5 + intensity;
    } else {
        food.material.emissiveIntensity = 0.2;
    }

    waves.forEach((wave, index) => {
        if (heating) {
            wave.material.opacity = 0.25 + Math.sin(t * 6 + index) * 0.15;
            const scale = 1 + Math.sin(t * 5 + index) * 0.06;
            wave.scale.set(scale, scale, scale);
        } else {
            wave.material.opacity *= 0.82; 
        }
    });

    panel.material.emissiveIntensity = heating ? 1.8 : 0.4;

    renderer.render(scene, camera);
}

animate();

///////////////////////////////////////////////////////////
// RESIZE ADAPTER
///////////////////////////////////////////////////////////
window.addEventListener('resize', () => {
    const w = container.clientWidth;
    const h = container.clientHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

</script>
</body>
</html>
