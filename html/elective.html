<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Smart Microwave Digital Twin</title>

<!-- 외부 의존성을 최소화하기 위해 딱 하나의 순정 라이브러리만 로드 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #d1d5db; /* 회색 공간 배경 */
        font-family: Arial, sans-serif;
    }

    #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        background: #d1d5db;
    }

    #ui {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 280px;
        padding: 20px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.9);
        color: white;
        z-index: 100;
        box-shadow: 0 0 25px rgba(0,0,0,0.25);
    }

    #ui h2 {
        margin-bottom: 18px;
        font-size: 22px;
        color: #7de7ff;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 10px;
        background: #00bfff;
        color: white;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
    }

    #status {
        margin-top: 16px;
        font-size: 14px;
        color: #7dffae;
        text-align: center;
    }
</style>
</head>

<body>

<div id="canvas-container"></div>

<div id="ui">
    <h2>⚡ Smart Microwave</h2>
    <button id="actionBtn">가열 및 턴테이블 가동</button>
    <div id="status">대기중</div>
</div>

<script>
window.onload = function() {
    const container = document.getElementById('canvas-container');
    const width = window.innerWidth;
    const height = window.innerHeight;

    ///////////////////////////////////////////////////////////
    // SCENE & RENDERER SETUP
    ///////////////////////////////////////////////////////////
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd1d5db); // 회색 스튜디오 공간

    // 카메라 각도를 사선 방향 뷰로 완전히 고정 (OrbitControls 없이도 입체 구별 가능)
    const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
    camera.position.set(5, 4, 7);
    camera.lookAt(0, 0, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    container.appendChild(renderer.domElement);

    ///////////////////////////////////////////////////////////
    // LIGHTS (그림자 연산을 빼고 직관적인 밝은 조명만 셋업)
    ///////////////////////////////////////////////////////////
    const ambient = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambient);

    const directional = new THREE.DirectionalLight(0xffffff, 1.0);
    directional.position.set(5, 10, 5);
    scene.add(directional);

    ///////////////////////////////////////////////////////////
    // MICROWAVE BOX MODELS (시각적 피드백용 원색 유닛들)
    ///////////////////////////////////////////////////////////
    const microwaveGroup = new THREE.Group();
    scene.add(microwaveGroup);

    // 1. 메인 외벽 박스 (확연히 인지되는 진한 차콜색 박스)
    const mainBody = new THREE.Mesh(
        new THREE.BoxGeometry(4.0, 2.6, 2.8),
        new THREE.MeshBasicMaterial({ color: 0x374151 }) // 음영 제약 없는 Basic 재질
    );
    microwaveGroup.add(mainBody);

    // 2. 우측 제어 패널 박스 (고대비 검은색 세로 박스)
    const controlPanel = new THREE.Mesh(
        new THREE.BoxGeometry(0.8, 2.4, 0.1),
        new THREE.MeshBasicMaterial({ color: 0x111827 })
    );
    controlPanel.position.set(1.5, 0, 1.36);
    microwaveGroup.add(controlPanel);

    // 3. 전면 도어 글라스 박스 (내부가 투명하게 비치는 파란색 판넬)
    const frontDoor = new THREE.Mesh(
        new THREE.BoxGeometry(2.8, 2.4, 0.05),
        new THREE.MeshBasicMaterial({ color: 0x1e3a8a, transparent: true, opacity: 0.6 })
    );
    frontDoor.position.set(-0.4, 0, 1.36);
    microwaveGroup.add(frontDoor);

    // 4. 내부 음식 회전판 (흰색 실린더)
    const internalPlate = new THREE.Mesh(
        new THREE.CylinderGeometry(0.9, 0.9, 0.05, 24),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
    );
    internalPlate.position.set(-0.4, -0.8, 0);
    microwaveGroup.add(internalPlate);

    // 5. 핵심 가열 대상 박스 (눈에 확 띄는 선명한 빨간색 구체)
    const foodMesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.3, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0xef4444 })
    );
    foodMesh.position.set(-0.4, -0.5, 0);
    microwaveGroup.add(foodMesh);

    ///////////////////////////////////////////////////////////
    // INTERACTION & ANIMATION LOGIC
    ///////////////////////////////////////////////////////////
    let isHeating = false;
    const actionBtn = document.getElementById('actionBtn');
    const statusText = document.getElementById('status');

    actionBtn.onclick = function() {
        isHeating = !isHeating;
        if (isHeating) {
            statusText.innerHTML = "⚡ 전자레인지 가동 중...";
            statusText.style.color = "#ff4565";
            actionBtn.innerHTML = "정지";
        } else {
            statusText.innerHTML = "대기중";
            statusText.style.color = "#7dffae";
            actionBtn.innerHTML = "가열 및 턴테이블 가동";
        }
    };

    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const elapsed = clock.getElapsedTime();

        // 메인 프레임워크가 정상 작동함을 보여주기 위해 전체 기기를 부드럽게 자체 회전시킴
        microwaveGroup.rotation.y = elapsed * 0.2;

        // 가열 버튼 클릭 시 내부 음식 및 회전판 작동 애니메이션
        if (isHeating) {
            internalPlate.rotation.y += 0.05;
            
            // 빨간색 음식을 위아래로 바운스 및 스케일 변화시켜 동적 피드백 제공
            foodMesh.position.y = -0.5 + Math.sin(elapsed * 10) * 0.05;
            const pulse = 1 + Math.sin(elapsed * 15) * 0.1;
            foodMesh.scale.set(pulse, pulse, pulse);
        } else {
            foodMesh.scale.set(1, 1, 1);
        }

        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
};
</script>
</body>
</html>
