<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Three.js 전자레인지 디지털 트윈</title>

<style>
    body{
        margin:0;
        overflow:hidden;
        background:#0b0f17;
        font-family:Arial, sans-serif;
    }

    #ui{
        position:absolute;
        top:20px;
        left:20px;
        width:280px;
        padding:18px;
        border-radius:16px;
        background:rgba(10,15,25,0.82);
        color:white;
        backdrop-filter:blur(10px);
        box-shadow:0 0 20px rgba(0,0,0,0.4);
        z-index:10;
    }

    #ui h2{
        margin-top:0;
        font-size:22px;
    }

    .control{
        margin-top:16px;
    }

    label{
        display:block;
        margin-bottom:8px;
        font-size:14px;
    }

    input[type=range]{
        width:100%;
    }

    button{
        width:100%;
        padding:12px;
        margin-top:14px;
        border:none;
        border-radius:10px;
        background:#00bfff;
        color:white;
        font-weight:bold;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        transform:scale(1.03);
        background:#17c7ff;
    }

    #status{
        margin-top:14px;
        font-size:14px;
        color:#7dffae;
    }
</style>
</head>

<body>

<div id="ui">
    <h2>⚡ Smart Microwave</h2>

    <div class="control">
        <label>출력 세기</label>
        <input type="range" id="power" min="1" max="10" value="5">
    </div>

    <div class="control">
        <label>회전 속도</label>
        <input type="range" id="speed" min="1" max="10" value="5">
    </div>

    <button id="startBtn">가열 시작</button>
    <button id="doorBtn">문 열기</button>

    <div id="status">대기중</div>
</div>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/controls/OrbitControls.js';

//////////////////////////////////////////////////////
// 기본 환경
//////////////////////////////////////////////////////

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0f17);

const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.set(8,5,10);

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

//////////////////////////////////////////////////////
// 카메라 컨트롤
//////////////////////////////////////////////////////

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

//////////////////////////////////////////////////////
// 조명
//////////////////////////////////////////////////////

const ambient = new THREE.AmbientLight(0xffffff,0.5);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff,1.5);
dirLight.position.set(10,15,10);
dirLight.castShadow = true;
scene.add(dirLight);

//////////////////////////////////////////////////////
// 바닥
//////////////////////////////////////////////////////

const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(50,50),
    new THREE.MeshStandardMaterial({
        color:0x222831,
        metalness:0.2,
        roughness:0.8
    })
);

floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

//////////////////////////////////////////////////////
// 전자레인지 본체
//////////////////////////////////////////////////////

const microwaveGroup = new THREE.Group();
scene.add(microwaveGroup);

const body = new THREE.Mesh(
    new THREE.BoxGeometry(6,3.5,4),
    new THREE.MeshStandardMaterial({
        color:0xc9c9c9,
        metalness:0.9,
        roughness:0.25
    })
);

body.castShadow = true;
body.position.y = 1.8;
microwaveGroup.add(body);

//////////////////////////////////////////////////////
// 내부 공간
//////////////////////////////////////////////////////

const cavity = new THREE.Mesh(
    new THREE.BoxGeometry(5.4,2.9,3.3),
    new THREE.MeshStandardMaterial({
        color:0x111111,
        side:THREE.BackSide
    })
);

cavity.position.set(-0.2,1.8,0);
microwaveGroup.add(cavity);

//////////////////////////////////////////////////////
// 유리문
//////////////////////////////////////////////////////

const doorPivot = new THREE.Group();
doorPivot.position.set(-3,1.8,2.05);
microwaveGroup.add(doorPivot);

const door = new THREE.Mesh(
    new THREE.BoxGeometry(6,3.2,0.15),
    new THREE.MeshPhysicalMaterial({
        color:0x222222,
        transmission:0.5,
        transparent:true,
        opacity:0.8,
        roughness:0.05,
        metalness:0.3
    })
);

door.position.x = 3;
door.castShadow = true;
doorPivot.add(door);

//////////////////////////////////////////////////////
// 내부 접시
//////////////////////////////////////////////////////

const plate = new THREE.Mesh(
    new THREE.CylinderGeometry(1.2,1.2,0.08,64),
    new THREE.MeshPhysicalMaterial({
        color:0xaee6ff,
        transparent:true,
        opacity:0.7,
        transmission:1,
        roughness:0
    })
);

plate.position.set(0,0.5,0);
plate.castShadow = true;
microwaveGroup.add(plate);

//////////////////////////////////////////////////////
// 음식
//////////////////////////////////////////////////////

const food = new THREE.Mesh(
    new THREE.SphereGeometry(0.5,32,32),
    new THREE.MeshStandardMaterial({
        color:0xff8844,
        emissive:0x220000
    })
);

food.position.set(0,0.95,0);
food.castShadow = true;
microwaveGroup.add(food);

//////////////////////////////////////////////////////
// 조작 패널
//////////////////////////////////////////////////////

const panel = new THREE.Mesh(
    new THREE.BoxGeometry(1,3,0.3),
    new THREE.MeshStandardMaterial({
        color:0x1d3557,
        emissive:0x08111f
    })
);

panel.position.set(2.6,1.8,2.15);
microwaveGroup.add(panel);

//////////////////////////////////////////////////////
// 마이크로파 효과
//////////////////////////////////////////////////////

const waveGeometry = new THREE.TorusGeometry(1.3,0.03,16,100);

const waveMaterial = new THREE.MeshBasicMaterial({
    color:0x00ccff,
    transparent:true,
    opacity:0
});

const waves = [];

for(let i=0;i<3;i++){

    const wave = new THREE.Mesh(waveGeometry,waveMaterial.clone());

    wave.rotation.x = Math.PI/2;
    wave.position.y = 1.2;

    wave.scale.setScalar(0.5 + i*0.2);

    microwaveGroup.add(wave);
    waves.push(wave);
}

//////////////////////////////////////////////////////
// 상태 변수
//////////////////////////////////////////////////////

let heating = false;
let doorOpen = false;

//////////////////////////////////////////////////////
// UI 연결
//////////////////////////////////////////////////////

const powerSlider = document.getElementById('power');
const speedSlider = document.getElementById('speed');

const statusText = document.getElementById('status');

document.getElementById('startBtn').onclick = () => {

    if(doorOpen){
        statusText.innerHTML = "문이 열려 있습니다";
        return;
    }

    heating = !heating;

    statusText.innerHTML = heating
        ? "가열중..."
        : "정지";
};

document.getElementById('doorBtn').onclick = () => {

    doorOpen = !doorOpen;

    if(doorOpen){
        heating = false;
        statusText.innerHTML = "문 열림";
    }else{
        statusText.innerHTML = "문 닫힘";
    }
};

//////////////////////////////////////////////////////
// 애니메이션
//////////////////////////////////////////////////////

const clock = new THREE.Clock();

function animate(){

    requestAnimationFrame(animate);

    const t = clock.getElapsedTime();

    controls.update();

    //////////////////////////////////////////////////////
    // 접시 회전
    //////////////////////////////////////////////////////

    const speed = Number(speedSlider.value) * 0.01;

    if(heating){
        plate.rotation.y += speed;
        food.rotation.y += speed;
    }

    //////////////////////////////////////////////////////
    // 문 애니메이션
    //////////////////////////////////////////////////////

    const targetRotation = doorOpen
        ? -Math.PI/1.8
        : 0;

    doorPivot.rotation.y +=
        (targetRotation - doorPivot.rotation.y) * 0.08;

    //////////////////////////////////////////////////////
    // 음식 발광
    //////////////////////////////////////////////////////

    if(heating){

        const intensity =
            Number(powerSlider.value) * 0.15;

        food.material.emissiveIntensity =
            0.5 + Math.sin(t*8)*0.3 + intensity;

    }else{

        food.material.emissiveIntensity = 0.2;
    }

    //////////////////////////////////////////////////////
    // 마이크로파 효과
    //////////////////////////////////////////////////////

    waves.forEach((wave,index)=>{

        if(heating){

            wave.material.opacity =
                0.15 + Math.sin(t*4 + index)*0.12;

            const scale =
                1 + Math.sin(t*3 + index)*0.08;

            wave.scale.set(scale,scale,scale);

        }else{

            wave.material.opacity *= 0.92;
        }
    });

    //////////////////////////////////////////////////////
    // 본체 미세 glow
    //////////////////////////////////////////////////////

    panel.material.emissiveIntensity =
        heating ? 1.2 : 0.3;

    renderer.render(scene,camera);
}

animate();

//////////////////////////////////////////////////////
// 반응형
//////////////////////////////////////////////////////

window.addEventListener('resize',()=>{

    camera.aspect =
        window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );
});

</script>

</body>
</html>
