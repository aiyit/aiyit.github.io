<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Smart Microwave Digital Twin</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #e5e7eb; /* 기본 뼈대 배경도 밝은 회색으로 지정 */
        font-family: 'Malgun Gothic', Arial, sans-serif;
    }

    /* 3D 렌더링 영역 강제 고정 */
    #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
    }

    /* 컨트롤러 고대비 UI 레이아웃 */
    #ui {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 290px;
        padding: 22px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.9); /* 대비감을 위해 UI는 선명한 다크톤 유지 */
        color: #f8fafc;
        z-index: 100;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    #ui h2 {
        margin-bottom: 16px;
        font-size: 20px;
        color: #38bdf8;
        font-weight: bold;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 10px;
    }

    .control {
        margin-top: 16px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #94a3b8;
    }

    input[type=range] {
        width: 100%;
        cursor: pointer;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 12px;
        border: none;
        border-radius: 8px;
        background: #0284c7;
        color: white;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
    }

    button:hover {
        transform: translateY(-2px);
        background: #0ea5e9;
    }

    #status {
        margin-top: 14px;
        font-size: 14px;
        text-align: center;
        font-weight: bold;
        color: #4ade80;
    }
</style>
</head>

<body>

<!-- 3D 그래픽 인프라가 안착할 컨테이너 -->
<div id="canvas-container"></div>

<div id="ui">
    <h2>⚡ Smart Microwave</h2>

    <div class="control">
        <label>출력 세기 (Power)</label>
        <input type="range" id="power" min="1" max="10" value="5">
    </div>

    <div class="control">
        <label>회전 속도 (Speed)</label>
        <input type="range" id="speed" min="1" max="10" value="5">
    </div>

    <button id="startBtn">가열 시작</button>
    <button id="doorBtn">문 열기</button>

    <div id="status">대기중</div>
</div>

<script type="module">

// [안정성 강화] 가장 신뢰도 높은 Cloudflare CDN 서버 경로로 전면 교체
import * as THREE from 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.module.js';

// OrbitControls 역시 동적 모듈 주소 안정화 버전으로 매핑
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/controls/OrbitControls.js';

const container = document.getElementById('canvas-container');
const width = window.innerWidth;
const height = window.innerHeight;

///////////////////////////////////////////////////////////
// SCENE & RENDERER (공간 회색조 변경)
///////////////////////////////////////////////////////////
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xd1d5db); // 어두운 암흑 대신 세련된 밝은 회색 공간

// 깊이감을 주는 안개 효과 역시 밝은 회색 계열로 동기화
scene.fog = new THREE.Fog(0xd1d5db, 20, 80);

const camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 1000);
camera.position.set(5, 5, 8); // 사선 위에서 내려다보는 최적의 아이소메트릭 뷰

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(width, height);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap; // 부드러운 그림자 맵 적용
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

container.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.target.set(0, 1.2, 0);

///////////////////////////////////////////////////////////
// LIGHTS SYSTEM (회색 스튜디오 맞춤형 셋업)
///////////////////////////////////////////////////////////
const ambient = new THREE.AmbientLight(0xffffff, 1.2); // 전체 음영을 지워줄 풍부한 조명
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(8, 15, 8);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
scene.add(dirLight);

// 반대편에서 은은하게 받쳐주는 보조광 추가
const hemiLight = new THREE.HemisphereLight(0xffffff, 0x4b5563, 0.6);
hemiLight.position.set(0, 20, 0);
scene.add(hemiLight);

///////////////////////////////////////////////////////////
// FLOOR (바닥판 레이어)
///////////////////////////////////////////////////////////
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(100, 100),
    new THREE.MeshStandardMaterial({ 
        color: 0x9ca3af, // 회색조 바닥 구성
        roughness: 0.5,
        metalness: 0.1
    })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

// 시각적 가이드라인을 제공할 회색 격자 판넬 추가
const grid = new THREE.GridHelper(30, 30, 0x4b5563, 0xbcbcbc);
grid.position.y = 0.01;
scene.add(grid);

///////////////////////////////////////////////////////////
// MICROWAVE DIGITAL TWIN MODEL (다크 실버 디자인)
///////////////////////////////////////////////////////////
const microwave = new THREE.Group();
scene.add(microwave);

// 외벽 바디 (회색 배경과 대비되도록 다크 차콜 메탈릭 그레이 채택)
const body = new THREE.Mesh(
    new THREE.BoxGeometry(5.5, 3.3, 3.8),
    new THREE.MeshStandardMaterial({
        color: 0x2b313b,
        metalness: 0.7,
        roughness: 0.25,
        transparent: true,
        opacity: 0.4 // 내부 회전판 관측 레이어
    })
);
body.position.y = 1.65;
body.castShadow = true;
microwave.add(body);

// 내부 회전 글라스 턴테이블
const plate = new THREE.Mesh(
    new THREE.CylinderGeometry(1.3, 1.3, 0.06, 40),
    new THREE.MeshStandardMaterial({ color: 0xf3f4f6, roughness: 0.1, transparent: true, opacity: 0.8 })
);
plate.position.set(-0.5, 0.15, 0);
plate.receiveShadow = true;
microwave.add(plate);

// 피가열체 (음식 가상 오브젝트)
const food = new THREE.Mesh(
    new THREE.SphereGeometry(0.35, 32, 32),
    new THREE.MeshStandardMaterial({
        color: 0xe11d48, // 선명한 다홍색
        emissive: 0xff0000,
        emissiveIntensity: 0.1
    })
);
food.position.set(-0.5, 0.5, 0);
food.castShadow = true;
microwave.add(food);

// 제어용 전면 우측 인터페이스 바
const panel = new THREE.Mesh(
    new THREE.BoxGeometry(0.9, 3.1, 0.15),
    new THREE.MeshStandardMaterial({ color: 0x0f172a, emissive: 0x020617, emissiveIntensity: 0.3 })
);
panel.position.set(2.15, 1.65, 1.81);
microwave.add(panel);

// 문(Door) 시스템 레이아웃
const doorPivot = new THREE.Group();
doorPivot.position.set(-2.75, 1.65, 1.91); 
microwave.add(doorPivot);

const door = new THREE.Mesh(
    new THREE.BoxGeometry(4.4, 3.1, 0.06),
    new THREE.MeshStandardMaterial({
        color: 0x1e293b,
        transparent: true,
        opacity: 0.5,
        metalness: 0.6,
        roughness: 0.15
    })
);
door.position.set(2.2, 0, 0);
door.castShadow = true;
doorPivot.add(door);

///////////////////////////////////////////////////////////
// HIGH-FREQUENCY WAVES (마그네트론 전자파 시각화 고리)
///////////////////////////////////////////////////////////
const waves = [];
for (let i = 0; i < 3; i++) {
    const wave = new THREE.Mesh(
        new THREE.TorusGeometry(0.45 + i * 0.22, 0.015, 16, 80),
        new THREE.MeshBasicMaterial({ color: 0x38bdf8, transparent: true, opacity: 0 })
    );
    wave.rotation.x = Math.PI / 2;
    wave.position.set(-0.5, 1.0, 0);
    microwave.add(wave);
    waves.push(wave);
}

///////////////////////////////////////////////////////////
// APP INTERACTION STATE
///////////////////////////////////////////////////////////
let heating = false;
let doorOpen = false;

const powerSlider = document.getElementById('power');
const speedSlider = document.getElementById('speed');
const statusText = document.getElementById('status');

document.getElementById('startBtn').onclick = () => {
    if (doorOpen) {
        statusText.innerHTML = '문이 열려 있습니다!';
        statusText.style.color = '#ef4444';
        return;
    }
    heating = !heating;
    statusText.innerHTML = heating ? '⚡ 고주파 가열 중...' : '정지됨';
    statusText.style.color = heating ? '#f43f5e' : '#4ade80';
};

document.getElementById('doorBtn').onclick = () => {
    doorOpen = !doorOpen;
    if (doorOpen) {
        heating = false;
        statusText.innerHTML = '🚪 문 열림';
        statusText.style.color = '#eab308';
    } else {
        statusText.innerHTML = '대기중';
        statusText.style.color = '#4ade80';
    }
};

///////////////////////////////////////////////////////////
// MAIN RENDER LOOP & REAL-TIME MATH
///////////////////////////////////////////////////////////
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    
    // 안전장치: 라이브러리가 정상 연산 중일때만 동역학 업데이트 실행
    try {
        const t = clock.getElapsedTime();
        controls.update();

        // 1. 가열 작동시 턴테이블 물리 회전
        if (heating) {
            const currentSpeed = Number(speedSlider.value) * 0.018;
            plate.rotation.y += currentSpeed;
            food.rotation.y += currentSpeed;
        }

        // 2. 개폐 각도 러프 연산
        const targetRotation = doorOpen ? -Math.PI / 1.6 : 0;
        doorPivot.rotation.y += (targetRotation - doorPivot.rotation.y) * 0.14;

        // 3. 분자 운동 열원 발광 애니메이션
        if (heating) {
            const intensityFactor = Number(powerSlider.value) * 0.3;
            food.material.emissiveIntensity = 0.5 + Math.sin(t * 15) * 0.4 + intensityFactor;
        } else {
            food.material.emissiveIntensity = 0.1;
        }

        // 4. 전자파 웨이브 파형 오퍼시티 제어
        waves.forEach((wave, index) => {
            if (heating) {
                wave.material.opacity = 0.3 + Math.sin(t * 8 + index) * 0.15;
                const scale = 1 + Math.sin(t * 6 + index) * 0.05;
                wave.scale.set(scale, scale, scale);
            } else {
                wave.material.opacity *= 0.8;
            }
        });

        // 5. 디스플레이 패널 연동 발광
        panel.material.emissiveIntensity = heating ? 2.0 : 0.3;

        renderer.render(scene, camera);
    } catch (e) {
        // 에러 추적용 콘솔 출력 포트 마련
        console.error("그래픽 연산 레이어 예외 발생: ", e);
    }
}

// 루프 스타트
animate();

///////////////////////////////////////////////////////////
// RESIZE RESPONSIVE ADAPTER
///////////////////////////////////////////////////////////
window.addEventListener('resize', () => {
    const w = window.innerWidth;
    const h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
});

</script>
</body>
</html>
