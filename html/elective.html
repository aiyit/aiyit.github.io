<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Smart Microwave Digital Twin</title>

<!-- 단일 라이브러리 체계 유지 (추가 플러그인 없이 내장 드래그 로직 구현) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #d1d5db;
        font-family: 'Malgun Gothic', Arial, sans-serif;
        user-select: none;
    }

    #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        background: #d1d5db;
        cursor: grab;
    }
    #canvas-container:active {
        cursor: grabbing;
    }

    #ui {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 290px;
        padding: 22px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.9);
        color: #f8fafc;
        z-index: 100;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    #ui h2 {
        margin-bottom: 16px;
        font-size: 20px;
        color: #38bdf8;
        font-weight: bold;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 10px;
    }

    .control {
        margin-top: 16px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #94a3b8;
    }

    input[type=range] {
        width: 100%;
        cursor: pointer;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
    }

    #startBtn {
        background: #0284c7;
        margin-top: 16px;
    }
    #startBtn:hover { background: #0ea5e9; }

    #doorBtn {
        background: #475569;
    }
    #doorBtn:hover { background: #64748b; }

    #status {
        margin-top: 14px;
        font-size: 14px;
        text-align: center;
        font-weight: bold;
        color: #4ade80;
    }
</style>
</head>

<body>

<div id="canvas-container"></div>

<div id="ui">
    <h2>⚡ Smart Microwave</h2>

    <div class="control">
        <label>출력 세기 (Power)</label>
        <input type="range" id="power" min="1" max="10" value="5">
    </div>

    <div class="control">
        <label>회전 속도 (Speed)</label>
        <input type="range" id="speed" min="1" max="10" value="5">
    </div>

    <button id="startBtn">가열 시작</button>
    <button id="doorBtn">문 열기</button>
    <div id="status">대기중</div>
</div>

<script>
window.onload = function() {
    const container = document.getElementById('canvas-container');
    const width = window.innerWidth;
    const height = window.innerHeight;

    ///////////////////////////////////////////////////////////
    // SCENE & RENDERER SETUP
    ///////////////////////////////////////////////////////////
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd1d5db); 
    scene.fog = new THREE.Fog(0xd1d5db, 15, 45);

    const camera = new THREE.PerspectiveCamera(38, width / height, 0.1, 1000);
    
    // [교정] 초기 위치를 정면으로 잡되, 거리를 기존 6.5에서 8.5로 멀리 떨어뜨려 시야 확보
    let cameraRadius = 8.5; 
    let cameraTheta = Math.PI / 2; // 좌우 회전각 (정면)
    let cameraPhi = Math.PI / 2.2;  // 상하 회전각 (약간 내려다보는 앵글)

    function updateCameraPosition() {
        camera.position.x = cameraRadius * Math.sin(cameraPhi) * Math.cos(cameraTheta);
        camera.position.y = cameraRadius * Math.cos(cameraPhi) + 0.8; // 기기 중심 높이 보정
        camera.position.z = cameraRadius * Math.sin(cameraPhi) * Math.sin(cameraTheta);
        camera.lookAt(0, 0, 0);
    }
    updateCameraPosition();

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    ///////////////////////////////////////////////////////////
    // MOUSE INTERACTION SYSTEM (3D 마우스 자유 관찰 제어기)
    ///////////////////////////////////////////////////////////
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };

    container.addEventListener('mousedown', (e) => {
        isDragging = true;
        previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;

        const deltaX = e.clientX - previousMousePosition.x;
        const deltaY = e.clientY - previousMousePosition.y;

        // 마우스 이동 변위량 계산 및 회전각 누적
        cameraTheta -= deltaX * 0.007;
        cameraPhi -= deltaY * 0.007;

        // 화면이 뒤집히는 물리 현상을 막기 위한 상하 구동 제한 (임계 보정)
        cameraPhi = Math.max(0.1, Math.min(Math.PI / 2 - 0.05, cameraPhi));

        updateCameraPosition();
        previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('mouseup', () => {
        isDragging = false;
    });

    // 휠 줌인/줌아웃 기능 추가하여 관찰 자유도 보장
    window.addEventListener('wheel', (e) => {
        cameraRadius += e.deltaY * 0.005;
        cameraRadius = Math.max(5.0, Math.min(15.0, cameraRadius));
        updateCameraPosition();
    });

    ///////////////////////////////////////////////////////////
    // LIGHTS SYSTEM
    ///////////////////////////////////////////////////////////
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambientLight);

    const mainLight = new THREE.DirectionalLight(0xffffff, 1.4);
    mainLight.position.set(6, 12, 8);
    scene.add(mainLight);

    const internalLight = new THREE.PointLight(0xffaa44, 0, 5); 
    internalLight.position.set(-0.4, 0, 0);
    scene.add(internalLight);

    ///////////////////////////////////////////////////////////
    // FLOOR & GRID
    ///////////////////////////////////////////////////////////
    const floor = new THREE.Mesh(
        new THREE.PlaneGeometry(60, 60),
        new THREE.MeshStandardMaterial({ color: 0x9ca3af, roughness: 0.6 })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -1.4;
    scene.add(floor);

    const grid = new THREE.GridHelper(30, 30, 0x4b5563, 0xbcbcbc);
    grid.position.y = -1.39;
    scene.add(grid);

    ///////////////////////////////////////////////////////////
    // DIGITAL TWIN MICROWAVE MODEL
    ///////////////////////////////////////////////////////////
    const microwave = new THREE.Group();
    scene.add(microwave);

    // 1. [교정] 가전제품 전용 투명 플라스틱 외벽 바디 사양 변경
    const bodyGeom = new THREE.BoxGeometry(4.6, 2.8, 3.2);
    const bodyMat = new THREE.MeshStandardMaterial({
        color: 0x222630,
        metalness: 0.0,          // 플라스틱 재질을 위해 금속성 제거
        roughness: 0.2,          // 매끄러운 플라스틱 특유의 하이라이트 광택 유도
        transparent: true,
        opacity: 0.45            
    });
    const bodyMesh = new THREE.Mesh(bodyGeom, bodyMat);
    microwave.add(bodyMesh);

    // 2. [교정] 내부 턴테이블 메탈 원판 사양 변경 (실버 스테인리스 메탈)
    const plateGeom = new THREE.CylinderGeometry(1.0, 1.0, 0.04, 40);
    const plateMat = new THREE.MeshStandardMaterial({
        color: 0xd1d5db,         // 은빛 메탈 베이스 컬러
        metalness: 0.95,         // 강렬한 금속 반사율 설정
        roughness: 0.25,         // 메탈 결의 은은한 거칠기 표현
    });
    const plateMesh = new THREE.Mesh(plateGeom, plateMat);
    plateMesh.position.set(-0.4, -1.1, 0);
    microwave.add(plateMesh);

    // 3. 음식 피가열체
    const foodGeom = new THREE.SphereGeometry(0.26, 32, 32);
    const foodMat = new THREE.MeshStandardMaterial({
        color: 0xe11d48,
        emissive: 0xff0000,
        emissiveIntensity: 0.1,
        roughness: 0.4
    });
    const foodMesh = new THREE.Mesh(foodGeom, foodMat);
    foodMesh.position.set(-0.4, -0.84, 0.45); 
    microwave.add(foodMesh);

    // 4. 전면 우측 조작 패널
    const panelGeom = new THREE.BoxGeometry(0.8, 2.6, 0.1);
    const panelMat = new THREE.MeshStandardMaterial({
        color: 0x090d16,
        metalness: 0.1,
        roughness: 0.2,
        emissive: 0x020617,
        emissiveIntensity: 0.3
    });
    const panelMesh = new THREE.Mesh(panelGeom, panelMat);
    panelMesh.position.set(1.8, 0, 1.58);
    microwave.add(panelMesh);

    // 5. 패널 상단 디지털 디스플레이 창
    const displayGeom = new THREE.BoxGeometry(0.5, 0.35, 0.02);
    const displayMat = new THREE.MeshStandardMaterial({
        color: 0x0284c7,
        emissive: 0x00dfff,
        emissiveIntensity: 0.4
    });
    const displayMesh = new THREE.Mesh(displayGeom, displayMat);
    displayMesh.position.set(1.8, 0.9, 1.64);
    microwave.add(displayMesh);

    ///////////////////////////////////////////////////////////
    // 우측 경첩 기반 도어 피벗(Pivot) 시스템
    ///////////////////////////////////////////////////////////
    const doorPivot = new THREE.Group();
    doorPivot.position.set(1.4, 0, 1.61); 
    microwave.add(doorPivot);

    const doorGeom = new THREE.BoxGeometry(3.6, 2.6, 0.06);
    const doorMat = new THREE.MeshStandardMaterial({
        color: 0x0f172a,
        metalness: 0.0,          // 전면 도어 프레임도 플라스틱 사양 적용
        roughness: 0.2,
        transparent: true,
        opacity: 0.5
    });
    const doorMesh = new THREE.Mesh(doorGeom, doorMat);
    doorMesh.position.set(-1.8, 0, 0); 
    doorPivot.add(doorMesh);

    ///////////////////////////////////////////////////////////
    // NEON MICRO WAVES EFFECT (고주파 파형 연출 고리)
    ///////////////////////////////////////////////////////////
    const waves = [];
    for (let i = 0; i < 3; i++) {
        const waveGeom = new THREE.TorusGeometry(0.35 + i * 0.2, 0.012, 16, 60);
        const waveMat = new THREE.MeshBasicMaterial({
            color: 0x38bdf8,
            transparent: true,
            opacity: 0
        });
        const waveMesh = new THREE.Mesh(waveGeom, waveMat);
        waveMesh.rotation.x = Math.PI / 2;
        waveMesh.position.set(-0.4, -0.2, 0);
        microwave.add(waveMesh);
        waves.push(waveMesh);
    }

    ///////////////////////////////////////////////////////////
    // CONTROL LOGIC & INPUT INTERFACE
    ///////////////////////////////////////////////////////////
    let heating = false;
    let doorOpen = false;

    const powerSlider = document.getElementById('power');
    const speedSlider = document.getElementById('speed');
    const startBtn = document.getElementById('startBtn');
    const doorBtn = document.getElementById('doorBtn');
    const statusText = document.getElementById('status');

    startBtn.onclick = function() {
        if (doorOpen) {
            statusText.innerHTML = "⚠️ 문을 닫아야 가열이 시작됩니다!";
            statusText.style.color = "#f59e0b";
            return;
        }
        heating = !heating;
        if (heating) {
            statusText.innerHTML = "⚡ 고주파 가열 중...";
            statusText.style.color = "#f43f5e";
            startBtn.innerHTML = "정지 (Stop)";
            startBtn.style.background = "#dc2626";
        } else {
            statusText.innerHTML = "대기중";
            statusText.style.color = "#4ade80";
            startBtn.innerHTML = "가열 시작";
            startBtn.style.background = "#0284c7";
        }
    };

    doorBtn.onclick = function() {
        doorOpen = !doorOpen;
        if (doorOpen) {
            heating = false; 
            statusText.innerHTML = "🚪 문 열림";
            statusText.style.color = "#eab308";
            doorBtn.innerHTML = "문 닫기";
            startBtn.innerHTML = "가열 시작";
            startBtn.style.background = "#0284c7";
        } else {
            statusText.innerHTML = "대기중";
            statusText.style.color = "#4ade80";
            doorBtn.innerHTML = "문 열기";
        }
    };

    ///////////////////////////////////////////////////////////
    // MAIN LOOP & PHYSICS ANIMATION
    ///////////////////////////////////////////////////////////
    const clock = new THREE.Clock();
    let foodAngle = 0;

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        // 1. 가열 중 작동 제어 알고리즘
        if (heating) {
            const currentSpeed = parseFloat(speedSlider.value) * 0.012;
            
            // 메탈 원판 회전 및 하이라이트 움직임 연출
            plateMesh.rotation.y += currentSpeed;
            
            // 메탈 원판 위 피가열체 공전 궤도
            foodAngle += currentSpeed;
            foodMesh.position.x = -0.4 + Math.sin(foodAngle) * 0.45;
            foodMesh.position.z = 0 + Math.cos(foodAngle) * 0.45;
            foodMesh.rotation.y += currentSpeed;

            // 출력 세기 실시간 광도 갱신
            const powerFactor = parseFloat(powerSlider.value) * 0.35;
            foodMesh.material.emissiveIntensity = 0.5 + Math.sin(t * 15) * 0.3 + powerFactor;
            internalLight.intensity = 1.0 + Math.sin(t * 10) * 0.2;

            waves.forEach((wave, index) => {
                wave.material.opacity = 0.35 + Math.sin(t * 8 + index) * 0.15;
                const scaleFactor = 1 + Math.sin(t * 6 + index) * 0.04;
                wave.scale.set(scaleFactor, scaleFactor, scaleFactor);
            });

            displayMesh.material.emissiveIntensity = 1.6 + Math.sin(t * 6) * 0.4;
        } else {
            foodMesh.material.emissiveIntensity = 0.1;
            internalLight.intensity = 0;
            displayMesh.material.emissiveIntensity = 0.4;
            waves.forEach(wave => wave.material.opacity *= 0.85);
        }

        // 2. 도어 120도 개폐 선형 보간 처리
        const targetDoorRotation = doorOpen ? (Math.PI / 1.5) : 0;
        doorPivot.rotation.y += (targetDoorRotation - doorPivot.rotation.y) * 0.1;

        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
};
</script>
</body>
</html>
