<!DOCTYPE html>
<!--
=========================================
CSS Transition 핵심 요약
=========================================

■ transition
- CSS 속성 변경을 부드러운 애니메이션으로 표현
- hover, click 등의 효과에 자주 사용

■ 기본 문법
transition: property duration timing-function delay;

■ 구성 요소
- property         : 변경할 CSS 속성
- duration         : 실행 시간(s, ms)
- timing-function  : 속도 변화(ease, linear, ease-in, ease-out 등)
- delay            : 시작 지연 시간

예)
transition: all 0.5s ease;

※ 핵심
- transition은 스타일 변화를 자연스럽게 만든다.
- duration이 없으면 애니메이션 효과가 나타나지 않는다.
-->
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>예제7-9 transition 예제</title>
  <style>
    /* 버튼 기본 스타일 */
    .btn {
      background-color: #3498db;   /* 기본 배경색 (파랑) */
      color: white;                /* 글자색 흰색 */
      padding: 15px 30px;          /* 내부 여백 (상하 15px, 좌우 30px) */
      border: none;                /* 테두리 없음 */
      border-radius: 5px;          /* 모서리 둥글게 */
      font-size: 16px;             /* 글자 크기 */
      transition: background-color 2s, transform 2s;
      /* transition: 속성 변화에 애니메이션 효과 적용
         - background-color: 2초 동안 색상 변화
         - transform: 2초 동안 크기 변화 */
      cursor: pointer;             /* 마우스 올리면 손 모양 커서 */
    }

    /* 마우스를 올렸을 때 효과 */
    .btn:hover {
      background-color: #2ecc71;   /* 초록색으로 배경 변경 */
      transform: scale(1.1);       /* 크기를 110%로 확대 */
    }
  </style>
</head>
<body>
  <h2>Transition 효과 버튼</h2>

  <!-- 버튼: hover 시 색상과 크기 변화 -->
  <button class="btn">마우스를 올리면 물체가 변합니다.</button>
</body>
</html>
