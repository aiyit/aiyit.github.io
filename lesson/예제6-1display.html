<!DOCTYPE html>
<!--
=========================================
블록 요소(Block) vs 인라인 요소(Inline)
=========================================

■ 블록 요소(Block)
- 항상 새로운 줄에서 시작
- 부모 너비(100%)를 기본으로 차지
- width, height, margin, padding 설정 가능
- 예) <div>, <p>, <h1>~<h6>, <section>, <article>, <ul>, <table>, <form>

■ 인라인 요소(Inline)
- 줄바꿈 없이 같은 줄에 배치
- 내용 크기만큼만 공간 차지
- width, height 설정 제한
- 예) <span>, <a>, <strong>, <em>, <img>, <label>, <input>

■ display 속성
display: block;        → 인라인 요소를 블록 요소로 변경
display: inline;       → 블록 요소를 인라인 요소로 변경
display: inline-block; → 인라인 배치 + width/height 설정 가능
display: none;         → 요소를 화면에서 숨김(렌더링 안됨)

※ 핵심
- Block : 한 줄 전체 사용
- Inline : 내용 크기만 사용
- Inline-block : 두 방식의 장점 결합
-->
<html>
<head>
    <title>예제6-1 display 속성</title>
    <meta charset="utf-8">
    <!-- 외부 CSS 파일 연결 -->
    <link type="text/css" rel="stylesheet" href="css/color.css">
    <style>
        /* ol 안의 li 요소를 inline으로 표시 */
        #OList li {
            display: inline;          /* 가로로 나열됨 */
            border: 1px solid blue;   /* 파란색 테두리 */
        }

        /* block 요소로 강제 변환 */
        #block {
            display: block;           /* 세로로 배치됨 */
            border: 1px solid green;  /* 초록색 테두리 */
        }
    </style> 
</head>
<body>
    <!-- 순서 있는 리스트 -->
    <ol id="OList">   
        <!-- li는 inline으로 표시되어 가로로 나열됨 -->
        <li>AI</li>
        <li>Software</li>
        <li>Dept.</li>
        <li>VR</li>
        <li>Convergence</li>
    </ol>

    <!-- 기본적으로 inline 요소인 i, sup, sub, a를 block으로 변환 -->
    <i class="block">이탤릭</i>        <!-- 이탤릭 글자 -->
    <sup class="block">위첨자</sup>   <!-- 위첨자 -->
    <sub class="block">아래첨자</sub> <!-- 아래첨자 -->
    <a class="block" href="#">링크</a> <!-- 링크 -->
</body>
</html>
