<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Smart Microwave Digital Twin & Dual Visualization</title>

<!-- 단일 라이브러리 및 마우스 드래그 관찰 체계 유지 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body, html {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #d1d5db;
        font-family: 'Malgun Gothic', Arial, sans-serif;
        user-select: none;
    }

    #canvas-container {
        position: absolute;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        background: #d1d5db;
        cursor: grab;
    }
    #canvas-container:active {
        cursor: grabbing;
    }

    /* 좌측 메인 제어 패널 UI */
    #ui {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 290px;
        padding: 22px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.9);
        color: #f8fafc;
        z-index: 100;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }

    /* [교정] 우측 하단 실시간 듀얼 데이터 분석 모니터 패널 UI (폭 확장) */
    #graph-panel {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 390px;
        padding: 16px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.95);
        color: #f8fafc;
        z-index: 100;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(56, 189, 248, 0.2);
    }

    .panel-title {
        font-size: 14px;
        font-weight: bold;
        color: #38bdf8;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
    }

    #current-watt {
        font-size: 16px;
        color: #4ade80;
        font-family: 'Courier New', Courier, monospace;
    }

    #powerGraph {
        width: 100%;
        height: 140px;
        background: #020617;
        border-radius: 10px;
        display: block;
        border: 1px solid rgba(255,255,255,0.05);
    }

    #ui h2 {
        margin-bottom: 16px;
        font-size: 20px;
        color: #38bdf8;
        font-weight: bold;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 10px;
    }

    .control {
        margin-top: 16px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #94a3b8;
    }

    input[type=range] {
        width: 100%;
        cursor: pointer;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        color: white;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s;
    }

    #startBtn { background: #0284c7; margin-top: 16px; }
    #startBtn:hover { background: #0ea5e9; }
    #doorBtn { background: #475569; }
    #doorBtn:hover { background: #64748b; }

    #status {
        margin-top: 14px;
        font-size: 14px;
        text-align: center;
        font-weight: bold;
        color: #4ade80;
    }
</style>
</head>

<body>

<div id="canvas-container"></div>

<!-- 좌측 제어 패널 -->
<div id="ui">
    <h2>⚡ Smart Microwave</h2>
    <div class="control">
        <label>출력 세기 (Power)</label>
        <input type="range" id="power" min="1" max="10" value="5">
    </div>
    <div class="control">
        <label>회전 속도 (Speed)</label>
        <input type="range" id="speed" min="1" max="10" value="5">
    </div>
    <button id="startBtn">가열 시작</button>
    <button id="doorBtn">문 열기</button>
    <div id="status">대기중</div>
</div>

<!-- 우측 하단 멀티 데이터 모니터 (막대 그래프 영역 공간 포함 캔버스 지정) -->
<div id="graph-panel">
    <div class="panel-title">
        <span>📉 Dual Power Meter Monitoring</span>
        <span id="current-watt">15 W</span>
    </div>
    <canvas id="powerGraph" width="358" height="140"></canvas>
</div>

<script>
window.onload = function() {
    const container = document.getElementById('canvas-container');
    const width = window.innerWidth;
    const height = window.innerHeight;

    ///////////////////////////////////////////////////////////
    // SCENE & RENDERER SETUP
    ///////////////////////////////////////////////////////////
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd1d5db); 
    scene.fog = new THREE.Fog(0xd1d5db, 15, 45);

    const camera = new THREE.PerspectiveCamera(38, width / height, 0.1, 1000);
    
    let cameraRadius = 8.5; 
    let cameraTheta = Math.PI / 2; 
    let cameraPhi = Math.PI / 2.2;  

    function updateCameraPosition() {
        camera.position.x = cameraRadius * Math.sin(cameraPhi) * Math.cos(cameraTheta);
        camera.position.y = cameraRadius * Math.cos(cameraPhi) + 0.8; 
        camera.position.z = cameraRadius * Math.sin(cameraPhi) * Math.sin(cameraTheta);
        camera.lookAt(0, 0, 0);
    }
    updateCameraPosition();

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    ///////////////////////////////////////////////////////////
    // MOUSE INTERACTION SYSTEM
    ///////////////////////////////////////////////////////////
    let isDragging = false;
    let previousMousePosition = { x: 0, y: 0 };

    container.addEventListener('mousedown', (e) => {
        isDragging = true;
        previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const deltaX = e.clientX - previousMousePosition.x;
        const deltaY = e.clientY - previousMousePosition.y;
        cameraTheta -= deltaX * 0.007;
        cameraPhi -= deltaY * 0.007;
        cameraPhi = Math.max(0.1, Math.min(Math.PI / 2 - 0.05, cameraPhi));
        updateCameraPosition();
        previousMousePosition = { x: e.clientX, y: e.clientY };
    });

    window.addEventListener('mouseup', () => { isDragging = false; });
    window.addEventListener('wheel', (e) => {
        cameraRadius += e.deltaY * 0.005;
        cameraRadius = Math.max(5.0, Math.min(15.0, cameraRadius));
        updateCameraPosition();
    });

    // LIGHTS
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.8); scene.add(ambientLight);
    const mainLight = new THREE.DirectionalLight(0xffffff, 1.4); mainLight.position.set(6, 12, 8); scene.add(mainLight);
    const internalLight = new THREE.PointLight(0xffaa44, 0, 5); internalLight.position.set(-0.4, 0, 0); scene.add(internalLight);

    // FLOOR & GRID
    const floor = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), new THREE.MeshStandardMaterial({ color: 0x9ca3af, roughness: 0.6 }));
    floor.rotation.x = -Math.PI / 2; floor.position.y = -1.4; scene.add(floor);
    const grid = new THREE.GridHelper(30, 30, 0x4b5563, 0xbcbcbc); grid.position.y = -1.39; scene.add(grid);

    ///////////////////////////////////////////////////////////
    // MICROWAVE MODEL COMPONENTS
    ///////////////////////////////////////////////////////////
    const microwave = new THREE.Group();
    scene.add(microwave);

    const bodyGeom = new THREE.BoxGeometry(4.6, 2.8, 3.2);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x222630, metalness: 0.0, roughness: 0.2, transparent: true, opacity: 0.45 });
    const bodyMesh = new THREE.Mesh(bodyGeom, bodyMat);
    microwave.add(bodyMesh);

    const plateGeom = new THREE.CylinderGeometry(0.85, 0.85, 0.04, 40);
    const plateMat = new THREE.MeshStandardMaterial({ color: 0xd1d5db, metalness: 0.95, roughness: 0.25 });
    const plateMesh = new THREE.Mesh(plateGeom, plateMat);
    plateMesh.position.set(-0.4, -1.1, 0);
    microwave.add(plateMesh);

    const foodGeom = new THREE.SphereGeometry(0.24, 32, 32);
    const foodMat = new THREE.MeshStandardMaterial({ color: 0xe11d48, emissive: 0xff0000, emissiveIntensity: 0.1, roughness: 0.4 });
    const foodMesh = new THREE.Mesh(foodGeom, foodMat);
    foodMesh.position.set(-0.4, -0.86, 0.38); 
    microwave.add(foodMesh);

    const panelGeom = new THREE.BoxGeometry(0.8, 2.6, 0.1);
    const panelMat = new THREE.MeshStandardMaterial({ color: 0x090d16, metalness: 0.1, roughness: 0.2, emissive: 0x020617, emissiveIntensity: 0.3 });
    const panelMesh = new THREE.Mesh(panelGeom, panelMat);
    panelMesh.position.set(1.8, 0, 1.58);
    microwave.add(panelMesh);

    const displayGeom = new THREE.BoxGeometry(0.5, 0.35, 0.02);
    const displayMat = new THREE.MeshStandardMaterial({ color: 0x0284c7, emissive: 0x00dfff, emissiveIntensity: 0.4 });
    const displayMesh = new THREE.Mesh(displayGeom, displayMat);
    displayMesh.position.set(1.8, 0.9, 1.64);
    microwave.add(displayMesh);

    const doorPivot = new THREE.Group();
    doorPivot.position.set(1.4, 0, 1.61); 
    microwave.add(doorPivot);

    const doorGeom = new THREE.BoxGeometry(3.6, 2.6, 0.06);
    const doorMat = new THREE.MeshStandardMaterial({ color: 0x0f172a, metalness: 0.0, roughness: 0.2, transparent: true, opacity: 0.5 });
    const doorMesh = new THREE.Mesh(doorGeom, doorMat);
    doorMesh.position.set(-1.8, 0, 0); 
    doorPivot.add(doorMesh);

    ///////////////////////////////////////////////////////////
    // [교정] 고화질 출력 가변형 전파 파형 레이어 풀(Pool) 구성
    // 세기가 커지면 더 많은 고리가 동적으로 활성화되도록 최대 6개 배치
    ///////////////////////////////////////////////////////////
    const waves = [];
    const maxWavesCount = 6; 
    for (let i = 0; i < maxWavesCount; i++) {
        const waveGeom = new THREE.TorusGeometry(0.18 + i * 0.16, 0.013, 16, 60);
        const waveMat = new THREE.MeshBasicMaterial({
            color: 0x38bdf8,
            transparent: true,
            opacity: 0
        });
        const waveMesh = new THREE.Mesh(waveGeom, waveMat);
        waveMesh.rotation.x = Math.PI / 2;
        waveMesh.position.set(-0.4, -0.2, 0);
        microwave.add(waveMesh);
        waves.push(waveMesh);
    }

    ///////////////////////////////////////////////////////////
    // CONTROL LOGIC INTERFACES
    ///////////////////////////////////////////////////////////
    let heating = false;
    let doorOpen = false;

    const powerSlider = document.getElementById('power');
    const speedSlider = document.getElementById('speed');
    const startBtn = document.getElementById('startBtn');
    const doorBtn = document.getElementById('doorBtn');
    const statusText = document.getElementById('status');
    const wattText = document.getElementById('current-watt');

    startBtn.onclick = function() {
        if (doorOpen) {
            statusText.innerHTML = "⚠️ 문을 닫아야 가열이 시작됩니다!";
            statusText.style.color = "#f59e0b";
            return;
        }
        heating = !heating;
        if (heating) {
            statusText.innerHTML = "⚡ 고주파 가열 중...";
            statusText.style.color = "#f43f5e";
            startBtn.innerHTML = "정지 (Stop)";
            startBtn.style.background = "#dc2626";
        } else {
            statusText.innerHTML = "대기중";
            statusText.style.color = "#4ade80";
            startBtn.innerHTML = "가열 시작";
            startBtn.style.background = "#0284c7";
        }
    };

    doorBtn.onclick = function() {
        doorOpen = !doorOpen;
        if (doorOpen) {
            heating = false; 
            statusText.innerHTML = "🚪 문 열림";
            statusText.style.color = "#eab308";
            doorBtn.innerHTML = "문 닫기";
            startBtn.innerHTML = "가열 시작";
            startBtn.style.background = "#0284c7";
        } else {
            statusText.innerHTML = "대기중";
            statusText.style.color = "#4ade80";
            doorBtn.innerHTML = "문 열기";
        }
    };

    ///////////////////////////////////////////////////////////
    // [신규] DUAL GRAPH MONITORING SYSTEM (막대 그래프 + 꺾은선)
    ///////////////////////////////////////////////////////////
    const graphCanvas = document.getElementById('powerGraph');
    const graphCtx = graphCanvas.getContext('2d');
    const dataPoints = new Array(50).fill(15); 

    function drawDualGraph(targetWatt) {
        dataPoints.push(targetWatt);
        dataPoints.shift();

        graphCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);

        // 1. 레이아웃 파티션 정의 (좌측: 막대그래프 존, 우측: 시계열 오실로스코프 존)
        const barZoneWidth = 45; 
        const lineZoneX = barZoneWidth + 15;
        const lineZoneWidth = graphCanvas.width - lineZoneX;

        // 격자 그리기 (우측 시계열 영역에만 적용)
        graphCtx.strokeStyle = 'rgba(56, 189, 248, 0.04)';
        graphCtx.lineWidth = 1;
        for (let x = lineZoneX; x < graphCanvas.width; x += 20) {
            graphCtx.beginPath(); graphCtx.moveTo(x, 0); graphCtx.lineTo(x, graphCanvas.height); graphCtx.stroke();
        }
        for (let y = 0; y < graphCanvas.height; y += 20) {
            graphCtx.beginPath(); graphCtx.moveTo(lineZoneX, y); graphCtx.lineTo(graphCanvas.width, y); graphCtx.stroke();
        }

        // 전체 최대 기준 전력 스케일 계수 (1300W 기준)
        const maxScale = 1300;
        const ratio = Math.min(targetWatt / maxScale, 1.0);
        const graphH = graphCanvas.height - 30; // 상하 여백 제거 높이

        ///////////////////////////////////////////////////////
        // A. [좌측] 실시간 수직 전력 막대 그래프 (Bar Chart) 구현
        ///////////////////////////////////////////////////////
        const barX = 12;
        const barW = 22;
        const barY = graphCanvas.height - (ratio * graphH) - 15;
        const barMaxY = graphCanvas.height - graphH - 15;

        // 막대 뒷배경 트랙 바디
        graphCtx.fillStyle = 'rgba(255, 255, 255, 0.05)';
        graphCtx.fillRect(barX, barMaxY, barW, graphH);

        // 현재 전력 층 그라데이션 충진
        const barGrad = graphCtx.createLinearGradient(barX, graphCanvas.height - 15, barX, barY);
        if (heating) {
            barGrad.addColorStop(0, '#f43f5e');
            barGrad.addColorStop(0.6, '#f97316');
            barGrad.addColorStop(1, '#facc15');
        } else {
            barGrad.addColorStop(0, '#16a34a');
            barGrad.addColorStop(1, '#4ade80');
        }
        graphCtx.fillStyle = barGrad;
        graphCtx.fillRect(barX, barY, barW, (ratio * graphH));

        // 테두리 마감인자 추가
        graphCtx.strokeStyle = heating ? 'rgba(244, 63, 94, 0.4)' : 'rgba(74, 222, 128, 0.3)';
        graphCtx.strokeRect(barX, barMaxY, barW, graphH);

        // 하단 서브라벨 텍스트 마킹
        graphCtx.fillStyle = '#64748b';
        graphCtx.font = '9px Arial';
        graphCtx.fillText("LOAD", barX - 1, graphCanvas.height - 3);

        ///////////////////////////////////////////////////////
        // B. [우측] 실시간 시계열 라인 그래프 (Line Chart) 구현
        ///////////////////////////////////////////////////////
        graphCtx.beginPath();
        graphCtx.lineWidth = 2.2;
        graphCtx.strokeStyle = heating ? '#f43f5e' : '#4ade80';
        
        const stepX = lineZoneWidth / (dataPoints.length - 1);
        
        for (let i = 0; i < dataPoints.length; i++) {
            const lRatio = dataPoints[i] / maxScale;
            const lx = lineZoneX + (i * stepX);
            const ly = graphCanvas.height - (lRatio * graphH) - 15;

            if (i === 0) graphCtx.moveTo(lx, ly);
            else graphCtx.lineTo(lx, ly);
        }
        graphCtx.stroke();

        // 라인 하단 반투명 영역 채우기
        graphCtx.lineTo(graphCanvas.width, graphCanvas.height - 15);
        graphCtx.lineTo(lineZoneX, graphCanvas.height - 15);
        graphCtx.closePath();
        const lineGrad = graphCtx.createLinearGradient(lineZoneX, 0, lineZoneX, graphCanvas.height);
        lineGrad.addColorStop(0, heating ? 'rgba(244, 63, 94, 0.12)' : 'rgba(74, 222, 128, 0.06)');
        lineGrad.addColorStop(1, 'rgba(2, 6, 23, 0)');
        graphCtx.fillStyle = lineGrad;
        graphCtx.fill();
    }

    ///////////////////////////////////////////////////////////
    // MAIN LOOP & PHYSICS ANIMATION
    ///////////////////////////////////////////////////////////
    const clock = new THREE.Clock();
    let foodAngle = 0;
    let targetPowerWatt = 15;

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        const powerVal = parseFloat(powerSlider.value); // 1단 ~ 10단 수치 데이터

        if (heating) {
            const currentSpeed = parseFloat(speedSlider.value) * 0.012;
            plateMesh.rotation.y += currentSpeed;
            
            foodAngle += currentSpeed;
            foodMesh.position.x = -0.4 + Math.sin(foodAngle) * 0.38;
            foodMesh.position.z = 0 + Math.cos(foodAngle) * 0.38;
            foodMesh.rotation.y += currentSpeed;

            const powerFactor = powerVal * 0.35;
            foodMesh.material.emissiveIntensity = 0.5 + Math.sin(t * 15) * 0.3 + powerFactor;
            internalLight.intensity = 1.0 + Math.sin(t * 10) * 0.2;

            // [교정] 출력 세기 비례 고주파 파형(Waves) 동적 밀도 제어 로직
            // 출력세기가 1~3단일 땐 전파 링이 2개, 4~7단일 땐 4개, 8단 이상일 땐 6개 전부 활성화
            let activeWavesLimit = 2;
            if (powerVal >= 4 && powerVal <= 7) activeWavesLimit = 4;
            if (powerVal >= 8) activeWavesLimit = maxWavesCount;

            const waveSpeedFactor = 4.0 + (powerVal * 1.3); // 고출력일수록 전파 확산 속도 업

            waves.forEach((wave, index) => {
                if (index < activeWavesLimit) {
                    // [교정] 출력 강도(powerVal)에 비례하여 사인 진폭(Amplitude)을 키워 전파가 훨씬 크게 요동치도록 제어
                    const amplitudeFactor = 0.02 + (powerVal * 0.009);
                    const pulse = 1 + Math.sin(t * waveSpeedFactor + index * 1.2) * amplitudeFactor;
                    
                    wave.scale.set(pulse, pulse, pulse);
                    wave.material.opacity = 0.35 + Math.sin(t * waveSpeedFactor + index) * 0.2;
                } else {
                    // 활성화 인계점을 벗어난 고차 파형 링은 즉시 소멸(숨김 처리)
                    wave.material.opacity *= 0.8;
                }
            });

            displayMesh.material.emissiveIntensity = 1.6 + Math.sin(t * 6) * 0.4;

            // 계측용 전력 수식 모델링 및 고출력 시 주파수 노이즈 요동 폭 확대
            const microWaveNoise = (Math.random() - 0.5) * (20 + powerVal * 4); 
            targetPowerWatt = (powerVal * 120) + microWaveNoise;

        } else {
            foodMesh.material.emissiveIntensity = 0.1;
            internalLight.intensity = 0;
            displayMesh.material.emissiveIntensity = 0.4;
            
            // 미가열 시 전파 완전 은폐
            waves.forEach(wave => wave.material.opacity *= 0.8);

            // 대기전력 모드 유지
            targetPowerWatt = 14 + (Math.random() - 0.5) * 2;
        }

        // 전력값 디스플레이 업데이트 및 그래프 동시 인젝션
        wattText.innerHTML = Math.round(targetPowerWatt) + " W";
        drawDualGraph(targetPowerWatt);

        // 도어 개폐 제어
        const targetDoorRotation = doorOpen ? (Math.PI / 1.5) : 0;
        doorPivot.rotation.y += (targetDoorRotation - doorPivot.rotation.y) * 0.1;

        renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', function() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
};
</script>
</body>
</html>
