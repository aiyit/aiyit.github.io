<!DOCTYPE html>
<html lang="ko">
<head>
    <!-- 문서 제목과 문자 인코딩 설정 -->
    <meta charset="utf-8">
    <title>예제6-14 navigation</title>

    <!-- 외부 CSS 파일(color.css) 연결 -->
    <link rel="stylesheet" href="css/color.css" />

    <!-- 반응형 웹을 위한 뷰포트 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style> 
        /* navigation 영역 스타일 */
        #nav {
            overflow: hidden;              /* 내부 요소가 넘치지 않도록 처리 */
            border-top: 2px solid blue;    /* 위쪽 파란색 테두리 */
            border-bottom: 2px solid blue; /* 아래쪽 파란색 테두리 */
            text-align: center;            /* 메뉴 항목 가운데 정렬 */
            padding: 15px 0;               /* 위아래 여백 */
            background: #f9f9f9;           /* 배경색 밝은 회색 */
        }

        /* navigation 안의 링크 스타일 */
        #nav a {
            display: inline-block;         /* 가로로 나열되도록 블록화 */
            padding: 10px 20px;            /* 내부 여백 (위아래 10px, 좌우 20px) */
            text-align: center;            /* 텍스트 가운데 정렬 */
            text-decoration: none;         /* 밑줄 제거 */
            color: black;                  /* 글자색 검정 */
            transition: color 0.3s, font-weight 0.3s; /* hover 시 부드럽게 변화 */
        }

        /* 링크에 마우스를 올리거나 포커스했을 때 효과 */
        #nav a:hover, #nav a:focus {
            font-weight: bold;             /* 글자 굵게 */
            color: red;                    /* 글자색 빨강 */
            outline: none;                 /* 포커스 테두리 제거 */
        }
    </style>
</head>
<body>
    <!-- 내비게이션 영역 -->
    <!-- aria-label: 접근성 향상, 스크린리더에서 '주요 내비게이션'으로 인식 -->
    <nav id="nav" aria-label="주요 내비게이션">
        <!-- 각 메뉴 항목 -->
        <a href="#">AI</a>
        <a href="#">HTML5</a>
        <a href="#">CSS3</a>
    </nav>
</body>
</html>
