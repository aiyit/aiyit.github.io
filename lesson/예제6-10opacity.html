<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>예제 6-10 투명성(Opacity)</title>
  <style>
    /* 모든 div 공통 스타일 */
    div {
      background-color: blue;   /* 배경색 파란색 */
      padding: 10px;            /* 내부 여백 */
      color: white;             /* 글자색 흰색 */
      margin-bottom: 10px;      /* 아래쪽 여백 */
    }

    /* 첫 번째 박스: 투명도 0.2 (매우 흐림) */
    #first {
      opacity: 0.2;
    }

    /* 두 번째 박스: 투명도 0.5 (반투명) */
    #second {
      opacity: 0.5;
    }

    /* 세 번째 박스: 투명도 0.8 (거의 불투명) */
    #third {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <!-- 제목 -->
  <h3>투명 Box</h3>

  <!-- opacity 0.2 예시 -->
  <div id="first">
    <p>opacity 0.2</p>
  </div>

  <!-- opacity 0.5 예시 -->
  <div id="second">
    <p>opacity 0.5</p>
  </div>

  <!-- opacity 0.8 예시 -->
  <div id="third">
    <p>opacity 0.8</p>
  </div>

  <!-- opacity 기본값 (1) 예시 -->
  <div>
    <p>opacity 1 (기본값)</p>
  </div>
</body>
</html>
