<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Smart Microwave Digital Twin</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        overflow: hidden;
        background: #0b0f17;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    #ui {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 280px;
        padding: 20px;
        border-radius: 18px;
        background: rgba(10, 15, 25, 0.85);
        color: white;
        z-index: 100;
        backdrop-filter: blur(12px);
        box-shadow: 0 0 25px rgba(0,0,0,0.45);
    }

    #ui h2 {
        margin-bottom: 18px;
        font-size: 22px;
        color: #7de7ff;
    }

    .control {
        margin-top: 18px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
    }

    input[type=range] {
        width: 100%;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 14px;
        border: none;
        border-radius: 10px;
        background: #00bfff;
        color: white;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.25s;
    }

    button:hover {
        transform: scale(1.03);
        background: #22ccff;
    }

    #status {
        margin-top: 16px;
        font-size: 14px;
        color: #7dffae;
    }
</style>
</head>

<body>

<div id="ui">
    <h2>⚡ Smart Microwave</h2>

    <div class="control">
        <label>출력 세기</label>
        <input type="range" id="power" min="1" max="10" value="5">
    </div>

    <div class="control">
        <label>회전 속도</label>
        <input type="range" id="speed" min="1" max="10" value="5">
    </div>

    <button id="startBtn">가열 시작</button>
    <button id="doorBtn">문 열기</button>

    <div id="status">대기중</div>
</div>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

///////////////////////////////////////////////////////////
// SCENE & RENDERER
///////////////////////////////////////////////////////////
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0f17);

// 무대 안개 범위를 크게 확장하여 오브젝트가 암전 속에 가로막히는 현상 방지
scene.fog = new THREE.Fog(0x0b0f17, 20, 100); 

// 초기 카메라 구도를 입체적인 사선 앵글로 배치
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(5, 4, 8); 

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.setPixelRatio(window.devicePixelRatio);
renderer.domElement.style.position = 'fixed';
renderer.domElement.style.top = '0';
renderer.domElement.style.left = '0';
renderer.domElement.style.zIndex = '1';
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1.5, 0);

///////////////////////////////////////////////////////////
// LIGHTS
///////////////////////////////////////////////////////////
const ambient = new THREE.AmbientLight(0xffffff, 1.8); // 기본 환경광을 밝게 세팅하여 음영 차단 해제
scene.add(ambient);

const directional = new THREE.DirectionalLight(0xffffff, 2.0);
directional.position.set(6, 12, 6);
directional.castShadow = true;
scene.add(directional);

///////////////////////////////////////////////////////////
// FLOOR
///////////////////////////////////////////////////////////
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 60),
    new THREE.MeshStandardMaterial({ color: 0x161e27, roughness: 0.8 })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

///////////////////////////////////////////////////////////
// MICROWAVE DIGITAL TWIN MODEL
///////////////////////////////////////////////////////////
const microwave = new THREE.Group();
scene.add(microwave);

// 외벽 바디 (내부 가시성을 확보한 실버 그레이 반투명 케이스)
const body = new THREE.Mesh(
    new THREE.BoxGeometry(6, 3.5, 4),
    new THREE.MeshStandardMaterial({
        color: 0xaaaaaa,
        metalness: 0.6,
        roughness: 0.2,
        transparent: true,
        opacity: 0.35 
    })
);
body.position.y = 1.75;
body.castShadow = true;
microwave.add(body);

// 턴테이블 회전판
const plate = new THREE.Mesh(
    new THREE.CylinderGeometry(1.4, 1.4, 0.08, 32),
    new THREE.MeshStandardMaterial({ color: 0xe0f7ff, transparent: true, opacity: 0.7, roughness: 0.1 })
);
plate.position.set(-0.5, 0.2, 0); 
plate.receiveShadow = true;
microwave.add(plate);

// 음식 오브젝트
const food = new THREE.Mesh(
    new THREE.SphereGeometry(0.35, 32, 32),
    new THREE.MeshStandardMaterial({
        color: 0xffaa66,
        emissive: 0xff4400,
        emissiveIntensity: 0.3
    })
);
food.position.set(-0.5, 0.55, 0);
food.castShadow = true;
microwave.add(food);

// 우측 기기 컨트롤 조작반
const panel = new THREE.Mesh(
    new THREE.BoxGeometry(1.0, 3.3, 0.2),
    new THREE.MeshStandardMaterial({ color: 0x1f3d5c, emissive: 0x0c1a2b, emissiveIntensity: 0.5 })
);
panel.position.set(2.4, 1.75, 1.91);
microwave.add(panel);

// 정밀 문(Door) 회전 구동 축 레이어
const doorPivot = new THREE.Group();
doorPivot.position.set(-3, 1.75, 2.01); 
microwave.add(doorPivot);

const door = new THREE.Mesh(
    new THREE.BoxGeometry(4.8, 3.3, 0.08), 
    new THREE.MeshStandardMaterial({
        color: 0x222222,
        transparent: true,
        opacity: 0.4,
        metalness: 0.5,
        roughness: 0.1
    })
);
door.position.set(2.4, 0, 0); 
door.castShadow = true;
doorPivot.add(door);

///////////////////////////////////////////////////////////
// MICROWAVE WAVES EFFECT (고주파 파형 가상화)
///////////////////////////////////////////////////////////
const waves = [];
for (let i = 0; i < 3; i++) {
    const wave = new THREE.Mesh(
        new THREE.TorusGeometry(0.5 + i * 0.25, 0.02, 16, 80),
        new THREE.MeshBasicMaterial({ color: 0x00dfff, transparent: true, opacity: 0 })
    );
    wave.rotation.x = Math.PI / 2;
    wave.position.set(-0.5, 1.1, 0);
    microwave.add(wave);
    waves.push(wave);
}

///////////////////////////////////////////////////////////
// INTERACTION CONTROLS
///////////////////////////////////////////////////////////
let heating = false;
let doorOpen = false;

const powerSlider = document.getElementById('power');
const speedSlider = document.getElementById('speed');
const statusText = document.getElementById('status');

document.getElementById('startBtn').onclick = () => {
    if (doorOpen) {
        statusText.innerHTML = '문이 열려 있습니다!';
        return;
    }
    heating = !heating;
    statusText.innerHTML = heating ? '⚡ 가열 중...' : '정지됨';
    statusText.style.color = heating ? '#ff4565' : '#7dffae';
};

document.getElementById('doorBtn').onclick = () => {
    doorOpen = !doorOpen;
    if (doorOpen) {
        heating = false;
        statusText.innerHTML = '🚪 문 열림';
        statusText.style.color = '#ffcc00';
    } else {
        statusText.innerHTML = '대기중';
        statusText.style.color = '#7dffae';
    }
};

///////////////////////////////////////////////////////////
// RENDER LOOP & ANIMATION INTERPOLATION
///////////////////////////////////////////////////////////
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    controls.update();

    // 1. 가열 중 회전 동역학 알고리즘
    if (heating) {
        const speed = Number(speedSlider.value) * 0.012;
        plate.rotation.y += speed;
        food.rotation.y += speed;
    }

    // 2. 부드러운 문 개폐 연산 (Lerp 기법)
    const targetRotation = doorOpen ? -Math.PI / 1.7 : 0;
    doorPivot.rotation.y += (targetRotation - doorPivot.rotation.y) * 0.12;

    // 3. 열 에너지 발광 시각화 역학
    if (heating) {
        const intensity = Number(powerSlider.value) * 0.25;
        food.material.emissiveIntensity = 0.6 + Math.sin(t * 12) * 0.5 + intensity;
    } else {
        food.material.emissiveIntensity = 0.2;
    }

    // 4. 전자파 웨이브 필드 연산
    waves.forEach((wave, index) => {
        if (heating) {
            wave.material.opacity = 0.25 + Math.sin(t * 6 + index) * 0.15;
            const scale = 1 + Math.sin(t * 5 + index) * 0.06;
            wave.scale.set(scale, scale, scale);
        } else {
            wave.material.opacity *= 0.82; 
        }
    });

    // 5. 패널 디스플레이 활성화 이펙트
    panel.material.emissiveIntensity = heating ? 1.8 : 0.4;

    renderer.render(scene, camera);
}

animate();

///////////////////////////////////////////////////////////
// RESIZE ADAPTER
///////////////////////////////////////////////////////////
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
