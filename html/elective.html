<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Smart Microwave Digital Twin</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        overflow: hidden;
        background: #0b0f17;
        font-family: Arial, sans-serif;
    }

    canvas {
        display: block;
    }

    #ui {
        position: fixed;
        top: 20px;
        left: 20px;
        width: 280px;
        padding: 20px;
        border-radius: 18px;
        background: rgba(10, 15, 25, 0.85);
        color: white;
        z-index: 100;
        backdrop-filter: blur(12px);
        box-shadow: 0 0 25px rgba(0,0,0,0.45);
    }

    #ui h2 {
        margin-bottom: 18px;
        font-size: 22px;
        color: #7de7ff;
    }

    .control {
        margin-top: 18px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
    }

    input[type=range] {
        width: 100%;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 14px;
        border: none;
        border-radius: 10px;
        background: #00bfff;
        color: white;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.25s;
    }

    button:hover {
        transform: scale(1.03);
        background: #22ccff;
    }

    #status {
        margin-top: 16px;
        font-size: 14px;
        color: #7dffae;
    }
</style>
</head>

<body>

<div id="ui">
    <h2>⚡ Smart Microwave</h2>

    <div class="control">
        <label>출력 세기</label>
        <input type="range" id="power" min="1" max="10" value="5">
    </div>

    <div class="control">
        <label>회전 속도</label>
        <input type="range" id="speed" min="1" max="10" value="5">
    </div>

    <button id="startBtn">가열 시작</button>
    <button id="doorBtn">문 열기</button>

    <div id="status">대기중</div>
</div>

<script type="module">

import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js';

///////////////////////////////////////////////////////////
// SCENE & RENDERER
///////////////////////////////////////////////////////////
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b0f17);
scene.fog = new THREE.Fog(0x0b0f17, 15, 40);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(6, 5, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.domElement.style.position = 'fixed';
renderer.domElement.style.top = '0';
renderer.domElement.style.left = '0';
renderer.domElement.style.zIndex = '1';
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, 1, 0);

///////////////////////////////////////////////////////////
// LIGHTS
///////////////////////////////////////////////////////////
const ambient = new THREE.AmbientLight(0xffffff, 1.5); // 가시성 확보를 위해 밝기 상향
scene.add(ambient);

const directional = new THREE.DirectionalLight(0xffffff, 2.5);
directional.position.set(5, 10, 5);
directional.castShadow = true;
scene.add(directional);

///////////////////////////////////////////////////////////
// FLOOR
///////////////////////////////////////////////////////////
const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(50, 50),
    new THREE.MeshStandardMaterial({ color: 0x1d2630, roughness: 0.9 })
);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

///////////////////////////////////////////////////////////
// MICROWAVE DIGITAL TWIN MODEL
///////////////////////////////////////////////////////////
const microwave = new THREE.Group();
scene.add(microwave);

// 외벽 바디 (내부가 보이도록 반투명 처리하거나 전면을 비워두는 구조로 변경)
const body = new THREE.Mesh(
    new THREE.BoxGeometry(6, 3.5, 4),
    new THREE.MeshStandardMaterial({
        color: 0x333333,
        metalness: 0.7,
        roughness: 0.3,
        transparent: true,
        opacity: 0.4 // 내부 구동 파트(음식, 턴테이블) 시각화를 위해 반투명화
    })
);
body.position.y = 1.75;
body.castShadow = true;
microwave.add(body);

// 턴테이블 회전판
const plate = new THREE.Mesh(
    new THREE.CylinderGeometry(1.5, 1.5, 0.08, 32),
    new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.6 })
);
plate.position.set(-0.5, 0.2, 0); // 제어 패널 공간을 제외하고 좌측 배치
plate.receiveShadow = true;
microwave.add(plate);

// 음식 오브젝트
const food = new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 32, 32),
    new THREE.MeshStandardMaterial({
        color: 0xff8844,
        emissive: 0xff3300,
        emissiveIntensity: 0.2
    })
);
food.position.set(-0.5, 0.6, 0);
food.castShadow = true;
microwave.add(food);

// 우측 컨트롤 패널 마운트
const panel = new THREE.Mesh(
    new THREE.BoxGeometry(1.0, 3.3, 0.2),
    new THREE.MeshStandardMaterial({ color: 0x18334f, emissive: 0x08111f })
);
panel.position.set(2.4, 1.75, 1.9);
microwave.add(panel);

// 문(Door) 피벗 시스템 구현
const doorPivot = new THREE.Group();
doorPivot.position.set(-3, 1.75, 2.0); // 외벽 좌측 전면 끝 모서리를 축으로 설정
microwave.add(doorPivot);

const door = new THREE.Mesh(
    new THREE.BoxGeometry(4.8, 3.3, 0.1), // 패널 공간 제외한 크기
    new THREE.MeshStandardMaterial({
        color: 0x222222,
        transparent: true,
        opacity: 0.5,
        metalness: 0.6,
        roughness: 0.2
    })
);
door.position.set(2.4, 0, 0); // 피벗 기준으로 우측으로 정렬 배치
door.castShadow = true;
doorPivot.add(door);

///////////////////////////////////////////////////////////
// MICROWAVE WAVES EFFECT (전자파 시각화 코일)
///////////////////////////////////////////////////////////
const waves = [];
for (let i = 0; i < 3; i++) {
    const wave = new THREE.Mesh(
        new THREE.TorusGeometry(0.6 + i * 0.3, 0.02, 16, 100),
        new THREE.MeshBasicMaterial({ color: 0x00ccff, transparent: true, opacity: 0 })
    );
    wave.rotation.x = Math.PI / 2;
    wave.position.set(-0.5, 1.2, 0);
    microwave.add(wave);
    waves.push(wave);
}

///////////////////////////////////////////////////////////
// APP STATES & INTERACTION
///////////////////////////////////////////////////////////
let heating = false;
let doorOpen = false;

const powerSlider = document.getElementById('power');
const speedSlider = document.getElementById('speed');
const statusText = document.getElementById('status');

document.getElementById('startBtn').onclick = () => {
    if (doorOpen) {
        statusText.innerHTML = '문이 열려 있습니다!';
        return;
    }
    heating = !heating;
    statusText.innerHTML = heating ? '⚡ 가열 중...' : '정지됨';
    statusText.style.color = heating ? '#ff5555' : '#7dffae';
};

document.getElementById('doorBtn').onclick = () => {
    doorOpen = !doorOpen;
    if (doorOpen) {
        heating = false;
        statusText.innerHTML = '🚪 문 열림';
        statusText.style.color = '#ffcc00';
    } else {
        statusText.innerHTML = '대기중';
        statusText.style.color = '#7dffae';
    }
};

///////////////////////////////////////////////////////////
// RENDER LOOP & ANIMATION
///////////////////////////////////////////////////////////
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();
    controls.update();

    // 1. 회전 제어 (가열 중에만 작동)
    if (heating) {
        const speed = Number(speedSlider.value) * 0.01;
        plate.rotation.y += speed;
        food.rotation.y += speed;
    }

    // 2. 문 개폐 부드러운 인터폴레이션 (Lerp)
    const targetRotation = doorOpen ? -Math.PI / 1.8 : 0;
    doorPivot.rotation.y += (targetRotation - doorPivot.rotation.y) * 0.1;

    // 3. 고주파 열원 이펙트 (음식 발광)
    if (heating) {
        const intensity = Number(powerSlider.value) * 0.2;
        food.material.emissiveIntensity = 0.5 + Math.sin(t * 10) * 0.4 + intensity;
    } else {
        food.material.emissiveIntensity = 0.1;
    }

    // 4. 전자파 웨이브 이펙트 애니메이션
    waves.forEach((wave, index) => {
        if (heating) {
            wave.material.opacity = 0.2 + Math.sin(t * 5 + index) * 0.15;
            const scale = 1 + Math.sin(t * 4 + index) * 0.05;
            wave.scale.set(scale, scale, scale);
        } else {
            wave.material.opacity *= 0.85; // 정지 시 자연스럽게 페이드아웃
        }
    });

    // 5. 우측 조작 패널 점등
    panel.material.emissiveIntensity = heating ? 1.5 : 0.2;

    renderer.render(scene, camera);
}

animate();

///////////////////////////////////////////////////////////
// RESIZE HANDLER
///////////////////////////////////////////////////////////
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
