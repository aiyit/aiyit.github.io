<html>
<head>
    <title>예제 8-17 2차원 for 문</title>
</head>
<body>
<h3> 2차원 for를 이용한 구구단 </h3>
   <table border="2">
   <script>
   // 바깥 for문: 1~9까지 반복 (세로축, 단 표시)
   for (var x = 1; x <= 9; x++) {  
        document.write("<tr>"); // 행 시작
        document.write("<td> " + x + "단" + "</td>"); // 세로축 값(1단~9단 표시)

        // 안쪽 for문: 2~9까지 반복 (가로축, 곱셈 결과 출력)
        for (var y = 2; y <= 9; y++) { 
            document.write("<td> " + x * y + "</td>"); // 곱셈 결과 출력
        }

        document.write("</tr>"); // 행 종료
    }
    </script>
    </table>   
</body>
</html>
