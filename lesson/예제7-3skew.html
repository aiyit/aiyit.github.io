<!DOCTYPE html>
<!--
transform 속성 중 skew()는 요소를 기울이는 변형을 할 때 사용.
기울이는 방향은 x축, y축, 또는 두 축 모두에 적용할 수 있으며, 각도 단위(degree)로 지정.
transform: skew(x각도, y각도);
x각도 : x축 방향으로의 기울기 (예: skew(20deg, 0) → x축으로 20도 기울임)
y각도 : y축 방향으로의 기울기 (예: skew(0, 20deg) → y축으로 20도 기울임)
하나만 입력하면 y값은 기본값 0deg로 처리
-->
<html>
<head>
    <title>예제7-3 Transform-skew()</title> 
    <meta charset="utf-8">
    <style>
        /* 공통 박스 스타일 */
        .box {
            width: 120px;            /* 박스 너비 */
            height: 80px;            /* 박스 높이 */
            margin: 10px;            /* 바깥 여백 */
            background-color: lightblue; /* 기본 배경색 */
            line-height: 80px;       /* 텍스트 수직 가운데 정렬 */
            text-align: center;      /* 텍스트 가로 가운데 정렬 */
            font-weight: bold;       /* 글자 굵게 */
            display: inline-block;   /* 가로로 나란히 배치 */
        }

        /* X축으로만 기울이기 */
        .skewX {
            transform: skew(20deg, 0); /* X축 방향으로 20도 기울임 */
        }

        /* Y축으로만 기울이기 */
        .skewY {
            transform: skew(0, 20deg); /* Y축 방향으로 20도 기울임 */
        }

        /* X축과 Y축 동시에 기울이기 */
        .skewXY {
            transform: skew(20deg, 20deg); /* X축 20도, Y축 20도 기울임 */
        }
    </style>
</head>
<body>
    <h1>Transform - skew()</h1>

    <!-- X축 방향으로만 기울임 -->
    <div class="box skewX">Skew X skew(20deg, 0)</div>

    <!-- Y축 방향으로만 기울임 -->
    <div class="box skewY">Skew Y skew(0, 20deg)</div>

    <!-- X축과 Y축 동시에 기울임 -->
    <div class="box skewXY">Skew XY skew(20deg, 20deg)</div>
</body>
</html>
