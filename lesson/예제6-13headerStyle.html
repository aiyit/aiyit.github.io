<!DOCTYPE html>
<!--
=========================================
웹 레이아웃(Layout) 핵심 요약
=========================================

■ 레이아웃(Layout)
- 웹 페이지의 요소를 배치하고 정렬하는 구조
- HTML + CSS로 화면 구성

■ 현대 레이아웃 방식
① Flexbox
- 1차원(가로/세로) 레이아웃
- 주요 속성
  display: flex;
  justify-content;
  align-items;

② CSS Grid
- 2차원(행 + 열) 레이아웃
- 주요 속성
  display: grid;
  grid-template-columns;
  grid-template-rows;

■ 주요 레이아웃 요소
- <header> : 상단(로고, 제목)
- <nav>    : 메뉴
- <main>   : 주요 콘텐츠
- <aside>  : 부가 정보
- <footer> : 하단 정보

※ 핵심
- Flexbox : 1차원 배치
- Grid    : 2차원 배치
- 시맨틱 태그를 사용하면 구조와 가독성이 향상된다.

<header> 요소는 웹 페이지의 상단 영역을 구성할 때 사용되며, 주로 사이트의 제목, 로고, 네비게이션 링크 등을 포함. 
문서나 섹션의 머리말로써, 사용자에게 사이트의 주제를 직관적으로 전달하는 역할.

-->
<html>
<head>
    <!-- 문서 제목과 문자 인코딩 설정 -->
    <title>예제 6-13 Header Style</title>
    <meta charset="utf-8">

    <!-- 외부 CSS 파일(color.css) 연결 -->
    <link type="text/css" rel="stylesheet" href="css/color.css">

    <!-- 반응형 웹을 위한 뷰포트 설정 -->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        /* 모든 요소에 box-sizing 적용
           border-box: padding과 border를 width/height에 포함시켜 계산 */
        * { box-sizing: border-box; }

        /* body 기본 여백 제거 */
        body { margin: 0; }

        /* header 스타일 정의
           margin: 바깥쪽 여백 5px
           padding: 안쪽 여백 5px
           text-align: 가운데 정렬
           background-color: 파란색 배경 */
        #header {
            margin: 5px;
            padding: 5px;
            text-align: center;
            background-color: blue;
        }
    </style>    
</head>
<body>
    <!-- header 영역 -->
    <header id="header">
        <!-- 제목 텍스트 -->
        <h2>AI 비서와 함께하는 웹호스팅</h2>
    </header>
</body>
</html>
