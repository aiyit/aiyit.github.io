<!DOCTYPE html>
<html>
<head>
    <title>예제8-2 외부 자바스크립트</title>
    <!-- 외부 자바스크립트 파일 연결 -->
    <!-- src 속성에 외부 JS 파일 경로를 지정 -->
    <!-- 이 예제에서는 "js/예제8-1jscode.js" 파일을 불러옴 -->
    <script src="js/예제8-1jscode.js"></script>
</head>
<body>
    <!-- 
자바스크립트(JavaScript) 핵심 정리

1. HTML은 내용, CSS는 디자인/구조, JS는 동작과 반응 담당
2. 넷스케이프의 브렌던 아이크가 개발, 초기 이름은 LiveScript → JavaScript로 변경
   MS는 ActiveScript로 명명, 현재는 ECMAScript 표준 사용
3. 주요 특징:
   - C/Java와 유사한 문법, 배우기 쉬움
   - 컴파일 없이 브라우저에서 실행되는 인터프리터 언어
   - 객체 기반(object-based) 언어
   - 함수형 프로그래밍 지원
4. HTML/CSS는 수동적, JS는 이벤트에 반응하여 문서/스타일 변경 가능
   → 웹 페이지를 인터랙티브하게 만듦
5. 삽입 방법:
   - 내부 자바스크립트: <head> 태그 내 <script> 작성
   - 외부 자바스크립트: .js 파일을 불러와 적용
   - 인라인 자바스크립트: <body> 태그 내 직접 작성
-->

    <!-- 페이지 본문 -->
    <h1>AI JavaScript Page</h1>
</body>
</html>
