<!DOCTYPE html>
<html>
<head>
    <title>예제8-7 변수</title>
</head>
<body>
<h3>JavaScript 변수선언</h3>
    <script>
        var x = 5, y = 6, z;    // 변수 x, y, z 선언 및 초기화
        z = x + y;              // x+y 값을 z에 대입
        document.write("x+y=", z +"<br/>");

        // 변수 이름 규칙: $, _ 사용 가능
        var $$, _x4, x123, xyz;
        $$ = 3; _x4 = 4; x123 = 5; xyz = 6;
        document.write($$+" $사용   "+_x4+" _밑줄사용  " + x123 
            + " x123   "+xyz+"<br/>");

        // 예약어 및 숫자로 시작하는 변수명은 사용할 수 없음
        document.write("예약어는 사용할 수 없음: var break=5; 1x3y=6 ;<br/>"); 
    </script>
	<h2>JavaScript var / let / const</h2>
<script>
  // var : 함수 스코프, 재선언/재할당 가능
  var a = 10;
  var a = 20; // 재선언 가능
  document.write("var a = " + a + "<br/>"); // 20

  // let : 블록 스코프, 재선언 불가, 재할당 가능
  let b = 30;
  b = 40; // 재할당 가능
  document.write("let b = " + b + "<br/>"); // 40
  // let b = 50; // 오류: 재선언 불가

  // const : 블록 스코프, 재선언/재할당 불가
  const c = 60;
  document.write("const c = " + c + "<br/>"); // 60
  // c = 70; // 오류: 재할당 불가

  // const로 객체 선언 → 내부 값 변경 가능
  const obj = { name: "AI" };
  obj.name = "Copilot"; // 객체 속성 변경은 가능
  document.write("const obj.name = " + obj.name + "<br/>"); // Copilot
</script>
</body>
</html>
